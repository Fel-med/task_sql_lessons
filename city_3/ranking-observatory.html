<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranking Observatory | Dataworks Citadel</title>
  <link rel="shortcut icon" href="../res/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="../shared_files/shared-room-layout.css" />
  <link rel="stylesheet" href="../shared_files/shared-room-components.css" />
  <link rel="stylesheet" href="../shared_files/shared-menu.css" />
  <style>
    .side-panel {
      display: flex;
      flex-direction: column;
    }

    .side-panel h1 {
      flex: 0 0 auto;
      font-size: 27px;
    }

    .room-counter,
    .path-title,
    .lesson-card {
      flex: 0 0 auto;
    }

    .lesson-list {
      flex: 1 1 auto;
      min-height: 0;
      padding: 2px 6px 6px 2px;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-color: var(--cyan) rgba(2, 6, 23, 0.72);
      scrollbar-width: thin;
    }

    .room-stage.is-welcome-room .info-card {
      top: 30px;
    }

    .lesson-card {
      max-height: 28vh;
      overflow-y: auto;
    }

    .marker-ranking-chart {
      left: 8.3%;
      top: 32%;
    }

    .marker-telescope {
      left: 24%;
      top: 39%;
    }

    .marker-partition-tubes {
      left: 75%;
      top: 42%;
    }

    .marker-clock {
      left: 91%;
      top: 24%;
    }

    .concept-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 10px 0;
    }

    .concept-grid .pixel-box {
      margin: 0;
      min-width: 0;
    }

    .formula-line {
      margin: 10px 0;
      padding: 9px 12px;
      border-left: 5px solid var(--yellow);
      background: rgba(255, 215, 106, 0.08);
      color: var(--cream);
      font-weight: 900;
    }

    .reward-modal {
      z-index: 140;
    }

    @media (max-width: 900px) {
      .concept-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .side-panel h1 {
        font-size: 22px;
      }

      .lesson-list {
        max-height: 120px;
      }

      .lesson-card {
        display: none;
      }
    }
  </style>
</head>

<body>
  <main class="room-layout">
    <aside class="side-panel">
      <h1>Ranking Observatory</h1>
      <p class="room-counter" id="roomCounter">Current Room: 0 / 8</p>
      <p class="path-title">Learning Path</p>
      <div class="lesson-list" id="roomList"></div>
      <article class="lesson-card" id="lessonCard">
        <h2 id="lessonTitle">Welcoming Room</h2>
        <div class="room-summary" id="lessonText"></div>
      </article>
    </aside>

    <section class="room-stage" aria-label="Ranking Observatory rooms">
      <img class="room-bg" id="roomBg" src="../res/city_3/rooms_background/ranking-observatory-welcome.webp" alt="" />
      <a class="return-city-btn" id="topReturn" href="index_city_3.html">Back to Dataworks Citadel</a>

      <div class="hotspots" id="hotspots">
        <button class="info-marker marker-ranking-chart" type="button" data-marker-id="rankingChart"
          aria-label="Ranking chart information"></button>
        <button class="info-marker marker-telescope" type="button" data-marker-id="telescope"
          aria-label="Analytical telescope information"></button>
        <button class="info-marker marker-partition-tubes" type="button" data-marker-id="partitionTubes"
          aria-label="Partition tubes information"></button>
        <button class="info-marker marker-clock" type="button" data-marker-id="timeClock"
          aria-label="Time window clock information"></button>
      </div>

      <div class="marker-tooltip" id="markerTooltip" aria-hidden="true">
        <h3 id="markerTooltipTitle"></h3>
        <p id="markerTooltipText"></p>
      </div>

      <div class="room-nav">
        <button class="pixel-btn" id="prevRoom" type="button">Previous</button>
        <button class="pixel-btn" id="nextRoom" type="button">Next</button>
        <a class="pixel-btn" id="finalReturn" href="index_city_3.html" hidden>Back to Dataworks Citadel</a>
      </div>

      <article class="info-card" id="infoCard" aria-live="polite">
        <div id="mainLessonContent"></div>
      </article>

      <article class="reward-modal" id="rewardModal" hidden>
        <div class="reward-card">
          <img src="../res/city_3/item/regular-key.webp" class="reward-key-img" alt="Schema Architect Hall Key" />
          <h2 id="rewardTitle">Schema Architect Hall Key</h2>
          <p id="rewardMessage">You received the Schema Architect Hall Key.</p>
          <button class="pixel-btn" id="rewardContinue" type="button">Continue</button>
        </div>
      </article>
    </section>
  </main>

  <div id="sharedMenuMount" data-menu-page="dataworks-citadel" data-menu-title="Dataworks Citadel Menu" data-menu-base="../"></div>
  <script src="../shared_files/shared-progress.js"></script>
  <script src="../shared_files/shared-reset-system.js"></script>
  <script src="../shared_files/shared-magic-key.js"></script>
  <script src="../shared_files/shared-menu.js"></script>
  <script>
    const canOpenRankingObservatory =
      window.SQLKingdomResetSystem?.guardDataworksCitadelBuildingAccess?.(
        "rankingObservatory",
        "index_city_3.html",
        "Ranking Observatory is not unlocked yet.",
        "../index.html"
      ) ?? true;

    const QUIZ_ADVANCE_DELAY_MS = 420;
    const TEMPLATE_KEY = "rankingObservatory";
    const BUILDING_ID = "rankingObservatory";
    const REWARD_NAME = "Schema Architect Hall Key";

    const rooms = [
      {
        title: "Welcoming Room",
        image: "../res/city_3/rooms_background/ranking-observatory-welcome.webp",
        type: "welcome",
        summary: "Window functions analyze related rows while keeping every original row visible.",
        points: ["Ranking Chart", "Analytical Telescope", "Partition Tubes", "Time Window Clock"],
        contentHtml: `
            <h2>Welcome to Ranking Observatory</h2>
            <p>This observatory studies how rows compare with their neighbors, groups, and timelines.</p>
            <p>Explore every glowing marker before entering the analytical rooms.</p>
            <ul>
              <li>Rank rows without collapsing the dataset.</li>
              <li>Separate calculations into independent groups.</li>
              <li>Build running and rolling time-series features.</li>
            </ul>
          `
      },
      {
        title: "Window Functions and OVER()",
        image: "../res/city_3/rooms_background/ranking-observatory-empty.webp",
        type: "lesson",
        summary: "OVER() defines the group and order of rows used by an analytical calculation.",
        points: ["Rows stay visible", "OVER defines the window", "Different from GROUP BY"],
        contentHtml: `
            <h2>Window Functions and OVER()</h2>
            <p>A window function calculates a value using rows related to the current row. Unlike <code>GROUP BY</code>, it does not combine many rows into one result row.</p>
            <pre class="sql-code"><code>SELECT
  employee_name,
  department,
  salary,
  AVG(salary) OVER () AS company_avg_salary
FROM employees;</code></pre>
            <p>Every employee remains visible, while the company average is added beside each row.</p>
            <div class="concept-grid">
              <div class="pixel-box"><strong>Function</strong><br>What should SQL calculate?</div>
              <div class="pixel-box"><strong>OVER</strong><br>Which rows belong to the calculation?</div>
              <div class="pixel-box"><strong>Result</strong><br>A new analytical column for every row.</div>
            </div>
            <div class="formula-line">Window function = analytical function + OVER(...)</div>
            <table class="result-table">
              <thead><tr><th>employee_name</th><th>department</th><th>salary</th><th>company_avg_salary</th></tr></thead>
              <tbody>
                <tr><td>Emma</td><td>Engineering</td><td>7200</td><td>6500</td></tr>
                <tr><td>Noah</td><td>Engineering</td><td>6800</td><td>6500</td></tr>
                <tr><td>Sofia</td><td>Sales</td><td>5500</td><td>6500</td></tr>
              </tbody>
            </table>
          `
      },
      {
        title: "ROW_NUMBER()",
        image: "../res/city_3/rooms_background/ranking-observatory-empty.webp",
        type: "lesson",
        summary: "ROW_NUMBER assigns a unique sequence number according to an ORDER BY rule.",
        points: ["Always unique", "Starts at 1", "Useful for top-N and deduplication"],
        contentHtml: `
            <h2>ROW_NUMBER()</h2>
            <p><code>ROW_NUMBER()</code> gives every row a unique position. Even rows with equal values receive different numbers.</p>
            <pre class="sql-code"><code>SELECT
  product_name,
  sales_amount,
  ROW_NUMBER() OVER (
    ORDER BY sales_amount DESC
  ) AS row_position
FROM product_sales;</code></pre>
            <table class="result-table">
              <thead><tr><th>product_name</th><th>sales_amount</th><th>row_position</th></tr></thead>
              <tbody>
                <tr><td>Keyboard</td><td>900</td><td>1</td></tr>
                <tr><td>Monitor</td><td>750</td><td>2</td></tr>
                <tr><td>Headphones</td><td>750</td><td>3</td></tr>
                <tr><td>Mouse</td><td>500</td><td>4</td></tr>
              </tbody>
            </table>
            <p>The two products with 750 sales still receive different row numbers.</p>
            <h3>Common ML preparation use</h3>
            <pre class="sql-code"><code>WITH latest_events AS (
  SELECT
    customer_id,
    event_time,
    event_type,
    ROW_NUMBER() OVER (
      PARTITION BY customer_id
      ORDER BY event_time DESC
    ) AS rn
  FROM customer_events
)
SELECT *
FROM latest_events
WHERE rn = 1;</code></pre>
            <p>This keeps the most recent event for every customer.</p>
          `
      },
      {
        title: "RANK() and DENSE_RANK()",
        image: "../res/city_3/rooms_background/ranking-observatory-empty.webp",
        type: "lesson",
        summary: "Both functions preserve ties, but only RANK leaves gaps after tied positions.",
        points: ["RANK leaves gaps", "DENSE_RANK has no gaps", "Tied values share a rank"],
        contentHtml: `
            <h2>RANK() and DENSE_RANK()</h2>
            <p>Use ranking functions when equal values should share the same position.</p>
            <pre class="sql-code"><code>SELECT
  player_name,
  score,
  RANK() OVER (ORDER BY score DESC) AS competition_rank,
  DENSE_RANK() OVER (ORDER BY score DESC) AS dense_rank
FROM game_scores;</code></pre>
            <table class="result-table">
              <thead><tr><th>player_name</th><th>score</th><th>competition_rank</th><th>dense_rank</th></tr></thead>
              <tbody>
                <tr><td>Emma</td><td>98</td><td>1</td><td>1</td></tr>
                <tr><td>Noah</td><td>91</td><td>2</td><td>2</td></tr>
                <tr><td>Sofia</td><td>91</td><td>2</td><td>2</td></tr>
                <tr><td>Liam</td><td>84</td><td>4</td><td>3</td></tr>
              </tbody>
            </table>
            <div class="concept-grid">
              <div class="pixel-box"><strong>ROW_NUMBER</strong><br>1, 2, 3, 4<br>Every row is unique.</div>
              <div class="pixel-box"><strong>RANK</strong><br>1, 2, 2, 4<br>Ties create gaps.</div>
              <div class="pixel-box"><strong>DENSE_RANK</strong><br>1, 2, 2, 3<br>Ties create no gaps.</div>
            </div>
            <p>Choose the function according to the meaning of the feature, not only its appearance.</p>
          `
      },
      {
        title: "OVER(PARTITION BY ...)",
        image: "../res/city_3/rooms_background/ranking-observatory-empty.webp",
        type: "lesson",
        summary: "PARTITION BY restarts the window calculation independently inside each group.",
        points: ["Creates logical groups", "Keeps detail rows", "Ranking restarts per group"],
        contentHtml: `
            <h2>OVER(PARTITION BY ...)</h2>
            <p><code>PARTITION BY</code> divides the result into independent windows. It behaves like grouping for the calculation, but it keeps every detail row.</p>
            <pre class="sql-code"><code>SELECT
  department,
  employee_name,
  salary,
  DENSE_RANK() OVER (
    PARTITION BY department
    ORDER BY salary DESC
  ) AS salary_rank_in_department
FROM employees;</code></pre>
            <table class="result-table">
              <thead><tr><th>department</th><th>employee_name</th><th>salary</th><th>salary_rank_in_department</th></tr></thead>
              <tbody>
                <tr><td>Engineering</td><td>Emma</td><td>7200</td><td>1</td></tr>
                <tr><td>Engineering</td><td>Noah</td><td>6800</td><td>2</td></tr>
                <tr><td>Sales</td><td>Olivia</td><td>6100</td><td>1</td></tr>
                <tr><td>Sales</td><td>Daniel</td><td>5500</td><td>2</td></tr>
              </tbody>
            </table>
            <p>The ranking restarts at 1 when the department changes.</p>
            <div class="flow-line">All rows → split by department → order salaries inside each department → calculate rank</div>
          `
      },
      {
        title: "Running Totals",
        image: "../res/city_3/rooms_background/ranking-observatory-empty.webp",
        type: "lesson",
        summary: "A running total accumulates values from the beginning of a sequence to the current row.",
        points: ["Requires a stable order", "Uses an expanding frame", "Useful for cumulative features"],
        contentHtml: `
            <h2>Running Totals</h2>
            <p>A running total adds the current value to every earlier value in the ordered window.</p>
            <pre class="sql-code"><code>SELECT
  sale_date,
  daily_sales,
  SUM(daily_sales) OVER (
    ORDER BY sale_date
    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
  ) AS cumulative_sales
FROM daily_store_sales;</code></pre>
            <table class="result-table">
              <thead><tr><th>sale_date</th><th>daily_sales</th><th>cumulative_sales</th></tr></thead>
              <tbody>
                <tr><td>2026-07-01</td><td>100</td><td>100</td></tr>
                <tr><td>2026-07-02</td><td>140</td><td>240</td></tr>
                <tr><td>2026-07-03</td><td>90</td><td>330</td></tr>
                <tr><td>2026-07-04</td><td>170</td><td>500</td></tr>
              </tbody>
            </table>
            <div class="formula-line">Current cumulative value = all ordered values from the first row through the current row.</div>
            <p>For customer-level cumulative features, add <code>PARTITION BY customer_id</code> so every customer starts from zero.</p>
          `
      },
      {
        title: "Rolling Metrics",
        image: "../res/city_3/rooms_background/ranking-observatory-empty.webp",
        type: "lesson",
        summary: "Rolling metrics use a moving frame around the current row instead of the entire history.",
        points: ["Moving row frame", "Smooths short-term noise", "Avoid future data leakage"],
        contentHtml: `
            <h2>Rolling Metrics</h2>
            <p>A rolling calculation uses a limited moving window. The frame moves as SQL processes each ordered row.</p>
            <pre class="sql-code"><code>SELECT
  metric_date,
  daily_visits,
  AVG(daily_visits) OVER (
    ORDER BY metric_date
    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW
  ) AS rolling_3_row_average
FROM website_metrics;</code></pre>
            <table class="result-table">
              <thead><tr><th>metric_date</th><th>daily_visits</th><th>rolling_3_row_average</th></tr></thead>
              <tbody>
                <tr><td>2026-07-01</td><td>90</td><td>90.0</td></tr>
                <tr><td>2026-07-02</td><td>120</td><td>105.0</td></tr>
                <tr><td>2026-07-03</td><td>150</td><td>120.0</td></tr>
                <tr><td>2026-07-04</td><td>180</td><td>150.0</td></tr>
              </tbody>
            </table>
            <h3>Important for machine learning</h3>
            <ul>
              <li>Use only the current row and earlier rows when predicting the future.</li>
              <li>Including later rows can leak information unavailable at prediction time.</li>
              <li>Partition by an entity such as customer, machine, or product when histories must remain separate.</li>
            </ul>
            <pre class="sql-code"><code>AVG(sensor_value) OVER (
  PARTITION BY machine_id
  ORDER BY measured_at
  ROWS BETWEEN 6 PRECEDING AND CURRENT ROW
)</code></pre>
          `
      },
      {
        title: "Quiz Room",
        image: "../res/city_3/rooms_background/ranking-observatory-empty.webp",
        type: "quiz",
        summary: "Test ranking, partitions, running totals, and rolling frames.",
        points: ["Six questions", "Randomized answer order", "All correct answers unlock the recap"],
        contentHtml: `
            <h2>Quiz Room</h2>
            <p>Answer every question correctly to unlock the recap room.</p>
            <div class="quiz-box">
              <article class="quiz-question" data-question-id="window-purpose">
                <h3>Question 1</h3>
                <p>What is a key difference between a window function and a normal <code>GROUP BY</code> aggregation?</p>
                <button class="quiz-option" type="button" data-correct="true">A window function keeps the original detail rows visible</button>
                <button class="quiz-option" type="button">A window function always removes duplicate rows</button>
                <button class="quiz-option" type="button">A window function cannot use an ORDER BY clause</button>
                <button class="quiz-option" type="button">A window function can only return one row</button>
              </article>

              <article class="quiz-question" data-question-id="row-number">
                <h3>Question 2</h3>
                <p>Which function always assigns a unique sequential number to every row?</p>
                <button class="quiz-option" type="button" data-correct="true">ROW_NUMBER()</button>
                <button class="quiz-option" type="button">RANK()</button>
                <button class="quiz-option" type="button">DENSE_RANK()</button>
                <button class="quiz-option" type="button">SUM()</button>
              </article>

              <article class="quiz-question" data-question-id="rank-gap">
                <h3>Question 3</h3>
                <p>Which ranking function can produce the sequence 1, 2, 2, 4?</p>
                <button class="quiz-option" type="button" data-correct="true">RANK()</button>
                <button class="quiz-option" type="button">DENSE_RANK()</button>
                <button class="quiz-option" type="button">ROW_NUMBER()</button>
                <button class="quiz-option" type="button">COUNT()</button>
              </article>

              <article class="quiz-question" data-question-id="partition">
                <h3>Question 4</h3>
                <p>What does <code>PARTITION BY department</code> do inside <code>OVER(...)</code>?</p>
                <button class="quiz-option" type="button" data-correct="true">It restarts the window calculation independently for each department</button>
                <button class="quiz-option" type="button">It deletes departments with few rows</button>
                <button class="quiz-option" type="button">It sorts departments alphabetically without calculating anything</button>
                <button class="quiz-option" type="button">It combines the whole result into one row</button>
              </article>

              <article class="quiz-question" data-question-id="running-total">
                <h3>Question 5</h3>
                <p>Which frame describes a running total from the beginning through the current row?</p>
                <button class="quiz-option" type="button" data-correct="true">ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW</button>
                <button class="quiz-option" type="button">ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING</button>
                <button class="quiz-option" type="button">ROWS BETWEEN 1 FOLLOWING AND 3 FOLLOWING</button>
                <button class="quiz-option" type="button">PARTITION BY CURRENT ROW</button>
              </article>

              <article class="quiz-question" data-question-id="rolling-leakage">
                <h3>Question 6</h3>
                <p>When creating a time-series feature for future prediction, what should a rolling window normally avoid?</p>
                <button class="quiz-option" type="button" data-correct="true">Using future rows that were not available at prediction time</button>
                <button class="quiz-option" type="button">Using an ORDER BY time column</button>
                <button class="quiz-option" type="button">Using earlier observations</button>
                <button class="quiz-option" type="button">Separating different machines with PARTITION BY</button>
              </article>
            </div>
            <p class="quiz-feedback"></p>
          `
      },
      {
        title: "Recap Room",
        image: "../res/city_3/rooms_background/ranking-observatory-empty.webp",
        type: "lesson",
        summary: "You can now construct ranking and time-series analytical features in SQL.",
        points: ["Ranking functions reviewed", "Partitions and frames reviewed", "Schema Architect Hall Key reward"],
        contentHtml: `
            <h2>Recap Room</h2>
            <p>You completed Ranking Observatory and learned how SQL compares rows without removing their detail.</p>
            <ul>
              <li><strong>ROW_NUMBER()</strong> creates a unique ordered sequence.</li>
              <li><strong>RANK()</strong> preserves ties and leaves gaps.</li>
              <li><strong>DENSE_RANK()</strong> preserves ties without gaps.</li>
              <li><strong>PARTITION BY</strong> creates independent analytical groups.</li>
              <li>Running totals use an expanding historical frame.</li>
              <li>Rolling metrics use a moving frame and are useful for time-series features.</li>
              <li>ML features should avoid using future information.</li>
            </ul>
            <p class="reward-note">Reward unlocked: Schema Architect Hall Key.</p>
          `
      }
    ];

    const welcomeMarkers = [
      {
        id: "rankingChart",
        title: "Ranking Chart",
        text: "The bars represent ordered values. Window ranking functions assign positions while keeping every row visible."
      },
      {
        id: "telescope",
        title: "Analytical Telescope",
        text: "The telescope represents looking across neighboring rows instead of examining one row in isolation."
      },
      {
        id: "partitionTubes",
        title: "Partition Tubes",
        text: "Each tube represents a separate group. PARTITION BY restarts the calculation inside every group."
      },
      {
        id: "timeClock",
        title: "Time Window Clock",
        text: "Ordered time windows create running totals and rolling metrics from historical observations."
      }
    ];

    let currentRoomIndex = 0;
    let currentQuizIndex = 0;
    let discoveryCompleteAnimationPlayed = false;
    let progress = getProgress();
    let suppressAutoCompletion = false;

    const roomBg = document.querySelector("#roomBg");
    const roomStage = document.querySelector(".room-stage");
    const roomCounter = document.querySelector("#roomCounter");
    const hotspots = document.querySelector("#hotspots");
    const prevRoom = document.querySelector("#prevRoom");
    const nextRoom = document.querySelector("#nextRoom");
    const topReturn = document.querySelector("#topReturn");
    const finalReturn = document.querySelector("#finalReturn");
    const roomList = document.querySelector("#roomList");
    const lessonTitle = document.querySelector("#lessonTitle");
    const lessonText = document.querySelector("#lessonText");
    const mainLessonContent = document.querySelector("#mainLessonContent");
    const rewardModal = document.querySelector("#rewardModal");
    const rewardContinue = document.querySelector("#rewardContinue");
    const markerTooltip = document.querySelector("#markerTooltip");
    const markerTooltipTitle = document.querySelector("#markerTooltipTitle");
    const markerTooltipText = document.querySelector("#markerTooltipText");

    function getProgress() {
      return window.SQLKingdomProgress.getGameProgress();
    }

    function saveProgress(progressToSave) {
      return window.SQLKingdomProgress.saveGameProgress(progressToSave);
    }

    function templateProgress() {
      progress.cities = progress.cities || {};
      progress.cities.dataworksCitadel = progress.cities.dataworksCitadel || {};
      progress.cities.dataworksCitadel[TEMPLATE_KEY] = progress.cities.dataworksCitadel[TEMPLATE_KEY] || {
        discoveredMarkers: [],
        highestRoomUnlocked: 0,
        quizPassed: false,
        completed: false,
        correctQuizAnswers: [],
        reward: ""
      };

      const template = progress.cities.dataworksCitadel[TEMPLATE_KEY];
      if (!Array.isArray(template.discoveredMarkers)) template.discoveredMarkers = [];
      if (!Array.isArray(template.correctQuizAnswers)) template.correctQuizAnswers = [];
      if (!Number.isInteger(template.highestRoomUnlocked) || template.highestRoomUnlocked < 0) {
        template.highestRoomUnlocked = 0;
      }
      template.quizPassed = Boolean(template.quizPassed);
      template.completed = Boolean(template.completed);
      return template;
    }

    function markerIds() {
      return welcomeMarkers.map((marker) => marker.id);
    }

    function discoveredMarkers() {
      return templateProgress().discoveredMarkers;
    }

    function discoveryCount() {
      const validMarkerIds = markerIds();
      return discoveredMarkers().filter((id) => validMarkerIds.includes(id)).length;
    }

    function allWelcomeMarkersDiscovered() {
      const discovered = discoveredMarkers();
      return welcomeMarkers.every((marker) => discovered.includes(marker.id));
    }

    function getWelcomeMarker(markerId) {
      return welcomeMarkers.find((marker) => marker.id === markerId);
    }

    function renderMainContent(contentHtml) {
      mainLessonContent.innerHTML = contentHtml;
    }

    function renderWelcomeContent(message = "", animateComplete = false) {
      const complete = allWelcomeMarkersDiscovered();
      const shouldAnimate = complete && animateComplete && !discoveryCompleteAnimationPlayed;
      const statusClass = complete
        ? `discovery-complete${shouldAnimate ? " animate-complete" : ""}`
        : "discovery-status";
      const statusText = complete
        ? "All observatory instruments discovered! You can enter the next room."
        : `Objects discovered: ${discoveryCount()} / ${welcomeMarkers.length}`;
      const warning = message ? `<p class="discovery-warning">${message}</p>` : "";

      return `
          <h2>Welcome to Ranking Observatory</h2>
          <p>Explore every glowing instrument before starting the analytical path.</p>
          <p class="${statusClass}">${statusText}</p>
          ${complete ? "" : `<p class="discovery-hint">Hover, focus, or click each marker to discover it.</p>`}
          ${warning}
        `;
    }

    function renderWelcomeSidebarSummary() {
      const complete = allWelcomeMarkersDiscovered();
      lessonTitle.textContent = rooms[0].title;
      lessonText.innerHTML = `
          <p>${rooms[0].summary}</p>
          <ul>
            <li>Objects discovered: ${discoveryCount()} / ${welcomeMarkers.length}</li>
            <li>${complete ? "Room 1 unlocked." : "Discover all observatory instruments to unlock Room 1."}</li>
          </ul>
        `;
    }

    function updateMarkerStates() {
      const discovered = discoveredMarkers();
      document.querySelectorAll(".info-marker").forEach((markerElement) => {
        const markerData = getWelcomeMarker(markerElement.dataset.markerId);
        const isDiscovered = discovered.includes(markerElement.dataset.markerId);
        markerElement.classList.toggle("is-discovered", isDiscovered);
        if (markerData) {
          markerElement.setAttribute(
            "aria-label",
            `${markerData.title} ${isDiscovered ? "discovered" : "not discovered"}`
          );
        }
      });
    }

    function unlockFirstLessonIfReady() {
      if (!allWelcomeMarkersDiscovered()) return false;
      const template = templateProgress();
      const unlockedNow = template.highestRoomUnlocked < 1;
      template.highestRoomUnlocked = Math.max(template.highestRoomUnlocked, 1);
      saveProgress(progress);
      return unlockedNow;
    }

    function markWelcomeMarkerDiscovered(markerId) {
      const markerData = getWelcomeMarker(markerId);
      if (!markerData) return;

      const wasComplete = allWelcomeMarkersDiscovered();
      const discovered = discoveredMarkers();
      if (!discovered.includes(markerId)) {
        discovered.push(markerId);
        saveProgress(progress);
      }

      const isComplete = allWelcomeMarkersDiscovered();
      if (isComplete) unlockFirstLessonIfReady();
      updateMarkerStates();

      if (currentRoomIndex === 0) {
        const shouldAnimateComplete = isComplete && !wasComplete && !discoveryCompleteAnimationPlayed;
        renderWelcomeSidebarSummary();
        renderMainContent(renderWelcomeContent("", shouldAnimateComplete));
        if (shouldAnimateComplete) discoveryCompleteAnimationPlayed = true;
        renderRoomList();
        updateNextButtonState();
      }
    }

    function showMarkerTooltip(markerElement, markerData) {
      markerTooltipTitle.textContent = markerData.title;
      markerTooltipText.textContent = markerData.text;
      markerTooltip.classList.add("is-visible");
      markerTooltip.setAttribute("aria-hidden", "false");

      const stageRect = roomStage.getBoundingClientRect();
      const markerRect = markerElement.getBoundingClientRect();
      const tooltipRect = markerTooltip.getBoundingClientRect();
      let left = markerRect.left - stageRect.left + markerRect.width / 2 - tooltipRect.width / 2;
      let top = markerRect.top - stageRect.top - tooltipRect.height - 14;

      if (top < 10) top = markerRect.bottom - stageRect.top + 14;
      left = Math.max(10, Math.min(left, stageRect.width - tooltipRect.width - 10));
      top = Math.max(10, Math.min(top, stageRect.height - tooltipRect.height - 10));
      markerTooltip.style.left = `${left}px`;
      markerTooltip.style.top = `${top}px`;
    }

    function hideMarkerTooltip() {
      markerTooltip.classList.remove("is-visible");
      markerTooltip.setAttribute("aria-hidden", "true");
    }

    function handleMarkerEnter(markerElement) {
      if (currentRoomIndex !== 0) return;
      const markerData = getWelcomeMarker(markerElement.dataset.markerId);
      if (!markerData) return;
      markWelcomeMarkerDiscovered(markerData.id);
      showMarkerTooltip(markerElement, markerData);
    }

    function updateNextButtonState() {
      const locked = currentRoomIndex === 0 && !allWelcomeMarkersDiscovered();
      nextRoom.classList.toggle("is-disabled", locked);
      nextRoom.setAttribute("aria-disabled", locked ? "true" : "false");
    }

    function updateCounter() {
      roomCounter.textContent = `Current Room: ${currentRoomIndex} / ${rooms.length - 1}`;
    }

    function formatRoomTitle(room, index) {
      return index === 0 ? "0. Welcoming Room" : `${String(index).padStart(2, "0")}. ${room.title}`;
    }

    function isRecapRoom(index) {
      return index === rooms.length - 1;
    }

    function canEnterRoom(index) {
      const template = templateProgress();
      if (index === 1 && !allWelcomeMarkersDiscovered()) return false;
      if (isRecapRoom(index) && !template.quizPassed) return false;
      return index <= template.highestRoomUnlocked;
    }

    function roomLockedMessage(index) {
      if (index === 1 && !allWelcomeMarkersDiscovered()) {
        return "Discover all welcome-room observatory instruments first.";
      }
      if (isRecapRoom(index) && !templateProgress().quizPassed) {
        return "Complete the quiz first to unlock the recap room.";
      }
      return "Explore the previous rooms first to unlock this room.";
    }

    function renderRoomList() {
      roomList.innerHTML = "";
      rooms.forEach((room, index) => {
        const tab = document.createElement("button");
        tab.type = "button";
        tab.className = "room-tab";
        tab.textContent = formatRoomTitle(room, index);
        const isUnlocked = canEnterRoom(index);
        if (!isUnlocked) tab.classList.add("locked");
        if (index === currentRoomIndex) tab.classList.add("active");

        tab.addEventListener("click", () => {
          if (!canEnterRoom(index)) {
            const message = roomLockedMessage(index);
            lessonTitle.textContent = "Room locked";
            lessonText.innerHTML = `<p>${message}</p>`;
            renderMainContent(`<h2>Room locked</h2><p>${message}</p>`);
            return;
          }
          currentRoomIndex = index;
          renderRoom();
        });
        roomList.appendChild(tab);
      });
    }

    function renderSidebarSummary(room) {
      lessonTitle.textContent = room.title;
      lessonText.innerHTML = `
          <p>${room.summary}</p>
          <ul>${room.points.map((point) => `<li>${point}</li>`).join("")}</ul>
        `;
    }

    function setQuizFeedback(message) {
      const feedback = mainLessonContent.querySelector(".quiz-feedback");
      if (feedback) feedback.textContent = message;
    }

    function shuffleArray(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function optionTextWithoutLetter(text) {
      return text.replace(/^[A-D]\.\s*/, "");
    }

    function quizQuestions() {
      return Array.from(mainLessonContent.querySelectorAll(".quiz-question"));
    }

    function quizQuestionIds() {
      return quizQuestions().map((question) => question.dataset.questionId);
    }

    function completedQuizQuestionCount() {
      const template = templateProgress();
      return quizQuestionIds().filter((id) => template.correctQuizAnswers.includes(id)).length;
    }

    function renderQuizTabs() {
      const quizBox = mainLessonContent.querySelector(".quiz-box");
      const questions = quizQuestions();
      if (!quizBox || questions.length <= 1) return;

      let tabs = mainLessonContent.querySelector(".quiz-tabs");
      if (!tabs) {
        tabs = document.createElement("div");
        tabs.className = "quiz-tabs";
        tabs.setAttribute("role", "tablist");
        tabs.setAttribute("aria-label", "Quiz questions");
        quizBox.insertBefore(tabs, quizBox.firstElementChild);
      }

      const template = templateProgress();
      currentQuizIndex = Math.max(0, Math.min(currentQuizIndex, questions.length - 1));
      tabs.innerHTML = "";

      questions.forEach((question, index) => {
        const questionId = question.dataset.questionId;
        const isActive = index === currentQuizIndex;
        const isComplete = template.correctQuizAnswers.includes(questionId);
        question.classList.add("quiz-question-panel");
        question.hidden = !isActive;
        question.classList.toggle("is-active", isActive);

        const tab = document.createElement("button");
        tab.type = "button";
        tab.className = "quiz-tab";
        tab.textContent = `Quiz ${index + 1}`;
        tab.setAttribute("role", "tab");
        tab.setAttribute("aria-selected", isActive ? "true" : "false");
        tab.classList.toggle("is-active", isActive);
        tab.classList.toggle("is-complete", isComplete);
        tab.addEventListener("click", () => {
          currentQuizIndex = index;
          renderQuizTabs();
          updateQuizFeedback();
        });
        tabs.appendChild(tab);
      });
    }

    function goToNextUnansweredQuizQuestion() {
      const template = templateProgress();
      const questions = quizQuestions();
      const nextIndex = questions.findIndex(
        (question) => !template.correctQuizAnswers.includes(question.dataset.questionId)
      );
      if (nextIndex !== -1) currentQuizIndex = nextIndex;
    }

    function shuffleQuizOptions() {
      quizQuestions().forEach((question) => {
        if (question.dataset.shuffled === "true") return;
        const options = Array.from(question.querySelectorAll(".quiz-option"));
        const optionData = options.map((option) => ({
          text: optionTextWithoutLetter(option.textContent),
          correct: option.dataset.correct === "true"
        }));

        shuffleArray(optionData).forEach((data, index) => {
          const option = options[index];
          option.textContent = `${String.fromCharCode(65 + index)}. ${data.text}`;
          if (data.correct) option.dataset.correct = "true";
          else delete option.dataset.correct;
          question.appendChild(option);
        });
        question.dataset.shuffled = "true";
      });
    }

    function updateQuizFeedback() {
      const template = templateProgress();
      const total = quizQuestionIds().length;
      const correct = completedQuizQuestionCount();
      if (template.quizPassed) {
        setQuizFeedback("Correct! The recap room is unlocked.");
        return;
      }
      setQuizFeedback(`Answer all quiz questions correctly to continue. Progress: ${correct} / ${total}.`);
    }

    function bindQuizOptions() {
      if (rooms[currentRoomIndex].type !== "quiz") return;
      shuffleQuizOptions();
      const template = templateProgress();
      renderQuizTabs();

      const allQuestionsAlreadyCorrect = quizQuestionIds().every((id) =>
        template.correctQuizAnswers.includes(id)
      );
      if (allQuestionsAlreadyCorrect && !template.quizPassed) {
        template.quizPassed = true;
        template.highestRoomUnlocked = Math.max(template.highestRoomUnlocked, currentRoomIndex + 1);
        saveProgress(progress);
      }

      quizQuestions().forEach((question) => {
        const questionId = question.dataset.questionId;
        const isComplete = template.correctQuizAnswers.includes(questionId);
        question.classList.toggle("is-complete", isComplete);
        question.querySelectorAll(".quiz-option").forEach((option) => {
          const isCorrect = option.dataset.correct === "true";
          option.classList.toggle("correct", isComplete && isCorrect);
          option.disabled = isComplete || template.quizPassed;
          option.addEventListener("click", () => handleQuizAnswer(option));
        });
      });

      updateQuizFeedback();
    }

    function handleQuizAnswer(option) {
      if (option.disabled) return;
      const question = option.closest(".quiz-question");
      if (!question) return;

      const questionId = question.dataset.questionId;
      const questionOptions = question.querySelectorAll(".quiz-option");
      questionOptions.forEach((item) => item.classList.remove("wrong"));
      question.classList.remove("is-transitioning");

      if (option.dataset.correct !== "true") {
        option.classList.add("wrong");
        setQuizFeedback("Not yet. Review the concept and try that question again.");
        return;
      }

      const template = templateProgress();
      if (!template.correctQuizAnswers.includes(questionId)) {
        template.correctQuizAnswers.push(questionId);
      }

      question.classList.add("is-complete", "is-transitioning");
      option.classList.add("correct");
      questionOptions.forEach((item) => {
        item.disabled = true;
      });

      const allCorrect = quizQuestionIds().every((id) =>
        template.correctQuizAnswers.includes(id)
      );

      if (allCorrect) {
        template.quizPassed = true;
        template.highestRoomUnlocked = Math.max(template.highestRoomUnlocked, currentRoomIndex + 1);
        setQuizFeedback("Correct! The recap room is unlocked.");
        saveProgress(progress);
        window.setTimeout(() => {
          question.classList.remove("is-transitioning");
          nextRoom.hidden = false;
          renderQuizTabs();
          renderRoomList();
        }, QUIZ_ADVANCE_DELAY_MS);
        return;
      }

      setQuizFeedback("Correct! Loading the next question...");
      saveProgress(progress);
      window.setTimeout(() => {
        question.classList.remove("is-transitioning");
        goToNextUnansweredQuizQuestion();
        renderQuizTabs();
        updateQuizFeedback();
      }, QUIZ_ADVANCE_DELAY_MS);
    }

    function renderRoom() {
      const room = rooms[currentRoomIndex];
      const template = templateProgress();
      const isFinalRoom = currentRoomIndex === rooms.length - 1;

      roomBg.src = room.image;
      roomStage.classList.toggle("is-welcome-room", currentRoomIndex === 0);
      hotspots.hidden = currentRoomIndex !== 0;
      prevRoom.hidden = currentRoomIndex === 0;
      nextRoom.hidden = isFinalRoom || (room.type === "quiz" && !template.quizPassed);
      topReturn.hidden = isFinalRoom;
      finalReturn.hidden = !isFinalRoom;
      hideMarkerTooltip();

      if (currentRoomIndex === 0) {
        renderWelcomeSidebarSummary();
        renderMainContent(renderWelcomeContent());
      } else {
        renderSidebarSummary(room);
        renderMainContent(room.contentHtml);
      }

      bindQuizOptions();
      updateMarkerStates();
      updateNextButtonState();
      renderRoomList();
      updateCounter();
      completeIfFinalRoom();
    }

    prevRoom.addEventListener("click", () => {
      currentRoomIndex = Math.max(0, currentRoomIndex - 1);
      renderRoom();
    });

    nextRoom.addEventListener("click", () => {
      if (currentRoomIndex === 0 && !allWelcomeMarkersDiscovered()) {
        renderMainContent(renderWelcomeContent("Discover all observatory instruments first."));
        updateNextButtonState();
        return;
      }

      const room = rooms[currentRoomIndex];
      if (room.type === "quiz" && !templateProgress().quizPassed) {
        setQuizFeedback("Answer every quiz question correctly to continue.");
        return;
      }

      if (currentRoomIndex < rooms.length - 1) {
        currentRoomIndex += 1;
        const template = templateProgress();
        if (currentRoomIndex > template.highestRoomUnlocked) {
          template.highestRoomUnlocked = currentRoomIndex;
          saveProgress(progress);
        }
      }
      renderRoom();
    });

    document.querySelectorAll(".info-marker").forEach((spot) => {
      spot.addEventListener("mouseenter", () => handleMarkerEnter(spot));
      spot.addEventListener("focus", () => handleMarkerEnter(spot));
      spot.addEventListener("click", (event) => {
        event.preventDefault();
        handleMarkerEnter(spot);
      });
      spot.addEventListener("mouseleave", () => {
        hideMarkerTooltip();
        if (currentRoomIndex === 0) renderWelcomeSidebarSummary();
      });
      spot.addEventListener("blur", () => {
        hideMarkerTooltip();
        if (currentRoomIndex === 0) renderWelcomeSidebarSummary();
      });
    });

    function completeIfFinalRoom() {
      if (currentRoomIndex !== rooms.length - 1) return;
      if (suppressAutoCompletion) return;
      const template = templateProgress();
      if (template.completed) return;

      template.completed = true;
      template.reward = REWARD_NAME;
      window.SQLKingdomProgress?.markDataworksCitadelBuildingComplete?.(
        progress,
        BUILDING_ID,
        REWARD_NAME
      );
      progress = saveProgress(progress);
      rewardModal.hidden = false;
    }

    finalReturn.addEventListener("click", () => {
      completeIfFinalRoom();
    });

    rewardContinue.addEventListener("click", () => {
      rewardModal.hidden = true;
    });

    window.addEventListener("sqlKingdom:reset", (event) => {
      if (event.detail.resetMode !== "local" || event.detail.cityId !== "dataworks-citadel") return;
      progress = getProgress();
      currentRoomIndex = 0;
      currentQuizIndex = 0;
      discoveryCompleteAnimationPlayed = false;
      rewardModal.hidden = true;
      renderRoom();
    });

    window.addEventListener("sqlKingdom:unlockAll", () => {
      progress = getProgress();
      suppressAutoCompletion = true;
      try {
        renderRoom();
      } finally {
        suppressAutoCompletion = false;
      }
    });

    if (canOpenRankingObservatory) {
      templateProgress();
      progress = saveProgress(progress);
      renderRoom();
    }
  </script>
</body>
