<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL Kingdom</title>
    <link rel="shortcut icon" href="res/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="shared_files/shared-menu.css" />
    <style>
      :root {
        --cream: #fff4c2;
        --ink: #101827;
        --panel: rgba(8, 14, 30, 0.8);
        --cyan: #5fffd6;
        --yellow: #ffd76a;
        --green: #74ff9f;
        --muted: #a7b5c9;
        --pixel-font: "Courier New", Courier, monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        min-height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        min-height: 100dvh;
        background: var(--ink) url("res/kingdom/kingdom_bg.png") center / cover fixed no-repeat;
        color: white;
        font-family: var(--pixel-font);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(5, 10, 22, 0.08), rgba(5, 10, 22, 0.35)),
          radial-gradient(circle at 50% 28%, rgba(95, 255, 214, 0.15), transparent 40%);
      }

      .kingdom-page {
        position: relative;
        z-index: 1;
        height: 100dvh;
        min-height: 100dvh;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 24px;
        width: min(1280px, calc(100% - 32px));
        margin: 0 auto;
        padding: 34px 0 42px;
        overflow: hidden;
      }

      .kingdom-header {
        text-align: center;
        text-shadow: 3px 3px 0 #000;
      }

      .kingdom-header h1 {
        margin: 0;
        color: var(--cream);
        font-size: clamp(42px, 8vw, 108px);
        font-weight: 900;
        line-height: 0.9;
        letter-spacing: 0;
        text-shadow:
          5px 5px 0 #050914,
          -2px -2px 0 #050914,
          2px -2px 0 #050914,
          -2px 2px 0 #050914,
          0 0 18px rgba(255, 244, 194, 0.72);
      }

      .kingdom-title-mark {
        width: clamp(54px, 8.5vw, 124px);
        height: clamp(54px, 8.5vw, 124px);
        object-fit: contain;
        margin-right: clamp(8px, 1.5vw, 18px);
        vertical-align: -0.08em;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        filter:
          drop-shadow(4px 4px 0 #050914)
          drop-shadow(0 0 12px rgba(95, 255, 214, 0.45));
      }

      .kingdom-header p {
        max-width: 760px;
        margin: 14px auto 0;
        color: white;
        font-size: clamp(15px, 2vw, 22px);
        font-weight: 900;
        line-height: 1.35;
      }

      .world-selector {
        align-self: center;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: clamp(10px, 2vw, 22px);
        width: 100%;
        min-height: 430px;
      }

      .nav-arrow {
        width: clamp(44px, 6vw, 66px);
        aspect-ratio: 1;
        border: 3px solid var(--cream);
        background: rgba(8, 14, 30, 0.78);
        color: var(--cream);
        font: 900 clamp(26px, 4vw, 42px) / 1 var(--pixel-font);
        cursor: pointer;
        box-shadow:
          4px 4px 0 #000,
          0 0 16px rgba(95, 255, 214, 0.28);
      }

      .nav-arrow:hover:not(:disabled),
      .nav-arrow:focus-visible:not(:disabled) {
        background: var(--yellow);
        color: var(--ink);
        outline: 3px solid var(--cyan);
        outline-offset: 4px;
      }

      .nav-arrow:disabled {
        cursor: not-allowed;
        opacity: 0.42;
        filter: grayscale(0.65);
      }

      .island-window {
        min-width: 0;
        overflow: hidden;
      }

      .island-track {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: end;
        gap: clamp(12px, 3vw, 36px);
      }

      .island-node {
        position: relative;
        display: grid;
        justify-items: center;
        align-content: end;
        min-height: clamp(250px, 34vw, 390px);
        padding: 12px 8px 0;
        color: white;
        text-align: center;
        text-decoration: none;
      }

      .island-node::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 48px;
        width: min(72%, 260px);
        height: 28px;
        transform: translateX(-50%);
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.35);
        filter: blur(8px);
        pointer-events: none;
      }

      .island-image-wrap {
        position: relative;
        display: grid;
        place-items: center;
        width: 100%;
        animation: islandFloat 4.6s ease-in-out infinite;
        animation-delay: var(--float-delay, 0s);
      }

      .island-node:nth-child(2) .island-image-wrap {
        animation-duration: 5.2s;
      }

      .island-node:nth-child(3) .island-image-wrap {
        animation-duration: 4.9s;
      }

      .island-node img {
        display: block;
        width: min(100%, 330px);
        height: auto;
        max-height: clamp(170px, 25vw, 290px);
        object-fit: contain;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        pointer-events: none;
        user-select: none;
        filter:
          drop-shadow(0 18px 0 rgba(0, 0, 0, 0.28))
          drop-shadow(0 0 14px rgba(95, 255, 214, 0.2));
        transition:
          transform 0.18s ease,
          filter 0.18s ease;
      }

      .island-name {
        position: relative;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        max-width: 100%;
        margin-top: 14px;
        padding: 8px 12px;
        border: 3px solid var(--cream);
        background: var(--panel);
        color: var(--cream);
        font-size: clamp(14px, 1.7vw, 20px);
        font-weight: 900;
        line-height: 1.1;
        text-shadow: 2px 2px 0 #000;
        box-shadow:
          4px 4px 0 #000,
          0 0 12px rgba(95, 255, 214, 0.22);
      }

      .island-status {
        color: var(--cyan);
        font-size: 12px;
      }

      .island-node.is-unlocked {
        cursor: pointer;
      }

      .island-node.is-unlocked:hover img,
      .island-node.is-unlocked:focus-visible img {
        transform: scale(1.06);
        filter:
          drop-shadow(0 18px 0 rgba(0, 0, 0, 0.28))
          drop-shadow(0 0 12px rgba(95, 255, 214, 0.95))
          drop-shadow(0 0 28px rgba(95, 255, 214, 0.65));
      }

      .island-node.is-unlocked:focus-visible {
        outline: 3px solid var(--cyan);
        outline-offset: 8px;
      }

      .island-node.is-locked-playable,
      .island-node.is-coming-soon {
        cursor: not-allowed;
      }

      .island-node.is-locked-playable img {
        opacity: 0.72;
        filter:
          grayscale(0.55)
          brightness(0.7)
          drop-shadow(0 18px 0 rgba(0, 0, 0, 0.3));
      }

      .island-node.is-coming-soon img {
        opacity: 0.58;
        filter:
          grayscale(0.75)
          brightness(0.62)
          drop-shadow(0 18px 0 rgba(0, 0, 0, 0.32));
      }

      .island-node.is-locked-playable .island-name,
      .island-node.is-coming-soon .island-name {
        border-color: rgba(255, 244, 194, 0.62);
        color: var(--muted);
      }

      .island-node.is-coming-soon .island-status {
        color: var(--yellow);
      }

      .lock-badge {
        position: absolute;
        top: clamp(16px, 2vw, 28px);
        right: clamp(18px, 4vw, 54px);
        z-index: 3;
        padding: 6px 8px;
        border: 2px solid var(--cream);
        background: rgba(5, 10, 22, 0.88);
        color: var(--cream);
        font-size: 12px;
        font-weight: 900;
        box-shadow: 3px 3px 0 #000;
      }

      .carousel-note {
        min-height: 20px;
        margin: 20px 0 0;
        color: var(--cyan);
        font-size: 13px;
        font-weight: 900;
        text-align: center;
        text-shadow: 2px 2px 0 #000;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @keyframes islandFloat {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(calc(var(--float-distance, 12px) * -1));
        }
      }

      @media (max-width: 860px) {
        body {
          background-attachment: scroll;
        }

        .kingdom-page {
          width: min(100% - 24px, 760px);
          padding-top: 26px;
        }

        .world-selector {
          grid-template-columns: 1fr;
          gap: 16px;
          min-height: 0;
        }

        .nav-arrow {
          width: 58px;
        }

        .nav-arrow.prev {
          justify-self: start;
          grid-row: 2;
        }

        .nav-arrow.next {
          justify-self: end;
          grid-row: 2;
        }

        .island-window {
          grid-row: 1;
        }

        .island-track {
          gap: 8px;
        }

        .island-node {
          min-height: 260px;
        }
      }

      @media (max-width: 560px) {
        .kingdom-page {
          width: min(100% - 18px, 440px);
        }

        .island-track {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 4px;
        }

        .island-node {
          min-height: 205px;
          padding-inline: 2px;
        }

        .island-node img {
          max-height: 132px;
        }

        .island-name {
          min-height: 46px;
          padding: 7px 6px;
          font-size: 11px;
        }

        .island-status,
        .lock-badge {
          font-size: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="kingdom-page">
      <header class="kingdom-header">
        <h1><img class="kingdom-title-mark" src="res/favicon.webp" alt="" aria-hidden="true">SQL Kingdom</h1>
        <p>Choose your city and continue your SQL learning journey.</p>
      </header>

      <section class="world-selector" aria-label="SQL Kingdom city carousel">
        <button class="nav-arrow prev" type="button" id="prevIsland" aria-label="Show previous islands">&lt;</button>

        <div class="island-window">
          <div class="island-track" id="islandTrack"></div>
          <p class="carousel-note" id="carouselNote" aria-live="polite"></p>
        </div>

        <button class="nav-arrow next" type="button" id="nextIsland" aria-label="Show next islands">&gt;</button>
      </section>
    </main>

    <div id="sharedMenuMount" data-menu-page="kingdom" data-menu-title="SQL Kingdom Menu"></div>
    <script src="shared_files/shared-progress.js"></script>
    <script src="shared_files/shared-reset-system.js"></script>
    <script src="shared_files/shared-magic-key.js"></script>
    <script src="shared_files/shared-menu.js"></script>
    <script>
      const islands = [
        {
          id: "foundation-city",
          name: "Foundation City",
          image: "res/kingdom/city_1.png",
          alt: "Foundation City island",
          type: "playable",
          link: "city_1/index_city_1.html"
        },
        {
          id: "data-prep-city",
          name: "Data Prep City",
          image: "res/kingdom/city_2.png",
          alt: "Data Prep City island",
          type: "playable",
          link: "city_2/index_city_2.html",
          lockedImage: "res/kingdom/shadow_island.png"
        },
        {
          id: "future-island-1",
          name: "Coming Soon",
          image: "res/kingdom/shadow_island.png",
          alt: "Locked future island",
          type: "coming-soon",
          link: null
        },
        {
          id: "future-island-2",
          name: "Coming Soon",
          image: "res/kingdom/shadow_island.png",
          alt: "Locked future island",
          type: "coming-soon",
          link: null
        },
        {
          id: "future-island-3",
          name: "Coming Soon",
          image: "res/kingdom/shadow_island.png",
          alt: "Locked future island",
          type: "coming-soon",
          link: null
        }
      ];

      const visibleCount = 3;
      const islandTrack = document.querySelector("#islandTrack");
      const prevButton = document.querySelector("#prevIsland");
      const nextButton = document.querySelector("#nextIsland");
      const carouselNote = document.querySelector("#carouselNote");
      const maxIndex = Math.max(0, islands.length - visibleCount);
      let currentIndex = 0;
      let progress = window.SQLKingdomProgress.getGameProgress({ queueMigrationMessage: true });

      function showUnlockToast(message) {
        if (!message) return;
        window.SQLKingdomMenu?.showToast(message);
      }

      function consumePendingUnlockMessage() {
        showUnlockToast(window.SQLKingdomProgress.consumePendingUnlockMessage());
      }

      function renderIslands() {
        progress = window.SQLKingdomProgress.getGameProgress({ queueMigrationMessage: true });
        const visibleIslands = islands.slice(currentIndex, currentIndex + visibleCount);
        islandTrack.replaceChildren();

        visibleIslands.forEach((island, position) => {
          const isUnlocked = island.type === "playable" && window.SQLKingdomProgress.isIslandUnlocked(island.id, progress);
          const islandState = isUnlocked ? "unlocked" : island.type === "playable" ? "locked-playable" : "coming-soon";
          const element = document.createElement(isUnlocked ? "a" : "article");
          element.className = `island-node is-${islandState}`;
          element.style.setProperty("--float-delay", `${position * 0.4}s`);
          element.style.setProperty("--float-distance", `${10 + position * 2}px`);

          if (isUnlocked) {
            element.href = island.link;
            element.setAttribute("aria-label", `Enter ${island.name}`);
          } else {
            element.setAttribute("aria-disabled", "true");
          }

          const imageWrap = document.createElement("div");
          imageWrap.className = "island-image-wrap";

          const image = document.createElement("img");
          image.src = isUnlocked ? island.image : island.lockedImage || "res/kingdom/shadow_island.png";
          image.alt = isUnlocked ? island.alt : "Locked island";

          imageWrap.appendChild(image);

          if (!isUnlocked) {
            const lockBadge = document.createElement("span");
            lockBadge.className = "lock-badge";
            lockBadge.textContent = islandState === "coming-soon" ? "SOON" : "LOCKED";
            imageWrap.appendChild(lockBadge);
          }

          const name = document.createElement("span");
          name.className = "island-name";
          if (isUnlocked) {
            name.textContent = island.name;
          } else {
            name.innerHTML = `<span>????</span><span class="island-status">${islandState === "coming-soon" ? "COMING SOON" : "LOCKED"}</span>`;
          }

          element.append(imageWrap, name);
          islandTrack.appendChild(element);
        });

        prevButton.disabled = currentIndex === 0;
        nextButton.disabled = currentIndex === maxIndex;
        carouselNote.textContent = `Showing islands ${currentIndex + 1}-${currentIndex + visibleIslands.length} of ${islands.length}`;
      }

      prevButton.addEventListener("click", () => {
        currentIndex = Math.max(0, currentIndex - 1);
        renderIslands();
      });

      nextButton.addEventListener("click", () => {
        currentIndex = Math.min(maxIndex, currentIndex + 1);
        renderIslands();
      });

      window.addEventListener("sqlKingdom:unlockAll", (event) => {
        progress = event.detail.progress;
        showUnlockToast(event.detail.message);
        renderIslands();
      });

      window.addEventListener("sqlKingdom:reset", (event) => {
        progress = event.detail.progress;
        showUnlockToast(event.detail.message);
        currentIndex = 0;
        renderIslands();
      });

      renderIslands();
      consumePendingUnlockMessage();
      showUnlockToast(window.SQLKingdomResetSystem?.consumeGuardMessage());
    </script>
  </body>
</html>
