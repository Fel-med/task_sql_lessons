<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL Kingdom</title>
    <link rel="shortcut icon" href="res/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="shared_files/shared-menu.css" />
    <style>
      :root {
        --cream: #fff4c2;
        --ink: #101827;
        --panel: rgba(8, 14, 30, 0.8);
        --cyan: #5fffd6;
        --yellow: #ffd76a;
        --green: #74ff9f;
        --muted: #a7b5c9;
        --pixel-font: "Courier New", Courier, monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        min-height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        min-height: 100dvh;
        background: var(--ink) url("res/kingdom/kingdom_bg.png") center / cover fixed no-repeat;
        color: white;
        font-family: var(--pixel-font);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(5, 10, 22, 0.08), rgba(5, 10, 22, 0.35)),
          radial-gradient(circle at 50% 28%, rgba(95, 255, 214, 0.15), transparent 40%);
      }

      .kingdom-page {
        position: relative;
        z-index: 1;
        height: 100dvh;
        min-height: 100dvh;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 24px;
        width: min(1280px, calc(100% - 32px));
        margin: 0 auto;
        padding: 34px 0 42px;
        overflow: hidden;
      }

      .kingdom-header {
        text-align: center;
        text-shadow: 3px 3px 0 #000;
      }

      .kingdom-header h1 {
        margin: 0;
        color: var(--cream);
        font-size: clamp(42px, 8vw, 108px);
        font-weight: 900;
        line-height: 0.9;
        letter-spacing: 0;
        text-shadow:
          5px 5px 0 #050914,
          -2px -2px 0 #050914,
          2px -2px 0 #050914,
          -2px 2px 0 #050914,
          0 0 18px rgba(255, 244, 194, 0.72);
      }

      .kingdom-title-mark {
        width: clamp(54px, 8.5vw, 124px);
        height: clamp(54px, 8.5vw, 124px);
        object-fit: contain;
        margin-right: clamp(8px, 1.5vw, 18px);
        vertical-align: -0.08em;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        filter:
          drop-shadow(4px 4px 0 #050914)
          drop-shadow(0 0 12px rgba(95, 255, 214, 0.45));
      }

      .kingdom-header p {
        max-width: 760px;
        margin: 14px auto 0;
        color: white;
        font-size: clamp(15px, 2vw, 22px);
        font-weight: 900;
        line-height: 1.35;
      }

      .world-selector {
        align-self: center;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: clamp(10px, 2vw, 22px);
        width: 100%;
        min-height: 430px;
      }

      .nav-arrow {
        position: relative;
        z-index: 5;
        width: clamp(44px, 6vw, 66px);
        aspect-ratio: 1;
        border: 3px solid var(--cream);
        background: rgba(8, 14, 30, 0.78);
        color: var(--cream);
        font: 900 clamp(26px, 4vw, 42px) / 1 var(--pixel-font);
        cursor: pointer;
        box-shadow:
          4px 4px 0 #000,
          0 0 16px rgba(95, 255, 214, 0.28);
      }

      .nav-arrow:hover:not(:disabled),
      .nav-arrow:focus-visible:not(:disabled) {
        background: var(--yellow);
        color: var(--ink);
        outline: 3px solid var(--cyan);
        outline-offset: 4px;
      }

      .nav-arrow:disabled {
        cursor: not-allowed;
        opacity: 0.42;
        filter: grayscale(0.65);
      }

      .island-window {
        position: relative;
        z-index: 1;
        min-width: 0;
        /* Island hover glows may extend beyond the center grid cell. */
        overflow: visible;
      }

      .island-track {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: end;
        gap: clamp(12px, 3vw, 36px);
      }

      .island-node {
        position: relative;
        display: grid;
        justify-items: center;
        align-content: end;
        min-height: clamp(250px, 34vw, 390px);
        padding: 12px 8px 0;
        color: white;
        text-align: center;
        text-decoration: none;
      }

      .island-node::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 48px;
        width: min(72%, 260px);
        height: 28px;
        transform: translateX(-50%);
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.35);
        filter: blur(8px);
        pointer-events: none;
      }

      .island-image-wrap {
        position: relative;
        display: grid;
        place-items: center;
        width: 100%;
        animation: islandFloat 4.6s ease-in-out infinite;
        animation-delay: var(--float-delay, 0s);
      }

      .island-node:nth-child(2) .island-image-wrap {
        animation-duration: 5.2s;
      }

      .island-node:nth-child(3) .island-image-wrap {
        animation-duration: 4.9s;
      }

      .island-node img {
        display: block;
        width: min(100%, 330px);
        height: auto;
        max-height: clamp(170px, 25vw, 290px);
        object-fit: contain;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        pointer-events: none;
        user-select: none;
        filter:
          drop-shadow(0 18px 0 rgba(0, 0, 0, 0.28))
          drop-shadow(0 0 14px rgba(95, 255, 214, 0.2));
        transition:
          transform 0.18s ease,
          filter 0.18s ease;
      }

      .island-name {
        position: relative;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        max-width: 100%;
        margin-top: 14px;
        padding: 8px 12px;
        border: 3px solid var(--cream);
        background: var(--panel);
        color: var(--cream);
        font-size: clamp(14px, 1.7vw, 20px);
        font-weight: 900;
        line-height: 1.1;
        text-shadow: 2px 2px 0 #000;
        box-shadow:
          4px 4px 0 #000,
          0 0 12px rgba(95, 255, 214, 0.22);
      }

      .island-status {
        color: var(--cyan);
        font-size: 12px;
      }

      .island-node.is-unlocked {
        cursor: pointer;
      }

      .island-node.is-unlocked:hover img,
      .island-node.is-unlocked:focus-visible img {
        transform: scale(1.06);
        filter:
          drop-shadow(0 18px 0 rgba(0, 0, 0, 0.28))
          drop-shadow(0 0 12px rgba(95, 255, 214, 0.95))
          drop-shadow(0 0 28px rgba(95, 255, 214, 0.65));
      }

      .island-node.is-unlocked:focus-visible {
        outline: 3px solid var(--cyan);
        outline-offset: 8px;
      }

      .island-node.is-locked-playable,
      .island-node.is-coming-soon {
        cursor: not-allowed;
      }

      .island-node.is-locked-playable img {
        opacity: 0.72;
        filter:
          grayscale(0.55)
          brightness(0.7)
          drop-shadow(0 18px 0 rgba(0, 0, 0, 0.3));
      }

      .island-node.is-coming-soon img {
        opacity: 0.58;
        filter:
          grayscale(0.75)
          brightness(0.62)
          drop-shadow(0 18px 0 rgba(0, 0, 0, 0.32));
      }

      .island-node.is-locked-playable .island-name,
      .island-node.is-coming-soon .island-name {
        border-color: rgba(255, 244, 194, 0.62);
        color: var(--muted);
      }

      .island-node.is-coming-soon .island-status {
        color: var(--yellow);
      }

      .lock-badge {
        position: absolute;
        top: clamp(16px, 2vw, 28px);
        right: clamp(18px, 4vw, 54px);
        z-index: 3;
        padding: 6px 8px;
        border: 2px solid var(--cream);
        background: rgba(5, 10, 22, 0.88);
        color: var(--cream);
        font-size: 12px;
        font-weight: 900;
        box-shadow: 3px 3px 0 #000;
      }

      .carousel-note {
        min-height: 20px;
        margin: 20px 0 0;
        color: var(--cyan);
        font-size: 13px;
        font-weight: 900;
        text-align: center;
        text-shadow: 2px 2px 0 #000;
      }



      .badge-collection-btn {
        position: fixed;
        top: 24px;
        left: 28px;
        z-index: 100;
        display: inline-flex;
        align-items: center;
        gap: 9px;
        min-height: 56px;
        padding: 9px 13px;
        border: 4px solid var(--cyan);
        background: rgba(8, 14, 30, 0.92);
        box-shadow:
          4px 4px 0 #000,
          0 0 18px rgba(95, 255, 214, 0.34);
        color: var(--cream);
        cursor: pointer;
        font: 900 13px/1.1 var(--pixel-font);
        text-transform: uppercase;
      }

      .badge-collection-btn:hover,
      .badge-collection-btn:focus-visible {
        background: var(--yellow);
        border-color: var(--cream);
        color: var(--ink);
        outline: none;
        transform: translateY(-2px);
        box-shadow:
          6px 6px 0 #000,
          0 0 24px rgba(255, 215, 106, 0.5);
      }

      .badge-collection-btn__symbol {
        display: grid;
        width: 30px;
        height: 30px;
        place-items: center;
        border: 2px solid currentColor;
        background: rgba(95, 255, 214, 0.12);
        font-size: 18px;
        line-height: 1;
      }

      .badge-collection-btn__text {
        display: grid;
        gap: 2px;
        text-align: left;
      }

      .badge-collection-count {
        color: var(--cyan);
        font-size: 11px;
      }

      .badge-collection-btn:hover .badge-collection-count,
      .badge-collection-btn:focus-visible .badge-collection-count {
        color: var(--ink);
      }

      .badge-collection-backdrop {
        position: fixed;
        inset: 0;
        z-index: 190;
        display: none;
        background: rgba(0, 0, 0, 0.58);
        backdrop-filter: blur(2px);
      }

      .badge-collection-backdrop.open {
        display: block;
      }

      .badge-collection-panel {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 210;
        width: min(780px, 94vw);
        height: 100dvh;
        padding: 26px;
        overflow-y: auto;
        border-right: 5px solid var(--cream);
        background:
          radial-gradient(circle at 20% 8%, rgba(95, 255, 214, 0.12), transparent 30%),
          #0a1222;
        box-shadow:
          10px 0 0 #000,
          0 0 34px rgba(95, 255, 214, 0.26);
        color: var(--cream);
        transform: translateX(-110%);
        transition: transform 0.22s ease;
      }

      .badge-collection-panel.open {
        transform: translateX(0);
      }

      .badge-collection-close {
        position: absolute;
        top: 18px;
        right: 18px;
        width: 38px;
        height: 38px;
        border: 3px solid var(--cream);
        background: #111827;
        box-shadow: 3px 3px 0 #000;
        color: var(--cream);
        cursor: pointer;
        font: 900 18px/1 var(--pixel-font);
      }

      .badge-collection-close:hover,
      .badge-collection-close:focus-visible {
        background: var(--yellow);
        color: var(--ink);
        outline: none;
      }

      .badge-collection-heading {
        margin: 0;
        padding-right: 52px;
        color: var(--cream);
        font-size: clamp(28px, 4vw, 46px);
        line-height: 1;
        text-shadow: 4px 4px 0 #000;
      }

      .badge-collection-summary {
        margin: 12px 0 0;
        color: var(--cyan);
        font-size: 14px;
        font-weight: 900;
        text-shadow: 2px 2px 0 #000;
      }

      .badge-magic-note {
        margin: 14px 0 0;
        padding: 10px 12px;
        border: 2px solid var(--yellow);
        background: rgba(255, 215, 106, 0.08);
        color: var(--yellow);
        font-size: 12px;
        font-weight: 900;
        line-height: 1.4;
        box-shadow: 3px 3px 0 #000;
      }

      .badge-magic-note[hidden] {
        display: none;
      }

      .badge-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
        margin-top: 22px;
      }

      .badge-card {
        position: relative;
        display: grid;
        grid-template-rows: minmax(150px, 1fr) auto;
        min-width: 0;
        padding: 14px;
        border: 3px solid #334155;
        background: rgba(15, 23, 42, 0.88);
        box-shadow: 5px 5px 0 #000;
        text-align: center;
        overflow: hidden;
      }

      .badge-card::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), transparent 45%);
      }

      .badge-card.is-collected {
        border-color: var(--cyan);
        box-shadow:
          5px 5px 0 #000,
          0 0 18px rgba(95, 255, 214, 0.58),
          inset 0 0 18px rgba(95, 255, 214, 0.1);
      }

      .badge-card.is-magic {
        border-color: var(--yellow);
        box-shadow:
          5px 5px 0 #000,
          0 0 18px rgba(255, 215, 106, 0.55),
          inset 0 0 18px rgba(255, 215, 106, 0.08);
      }

      .badge-card__image-wrap {
        position: relative;
        display: grid;
        min-height: 150px;
        place-items: center;
      }

      .badge-card__image {
        display: block;
        width: min(100%, 170px);
        max-height: 190px;
        object-fit: contain;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        user-select: none;
        filter: grayscale(1) brightness(0.36) opacity(0.62);
        transition:
          transform 0.2s ease,
          filter 0.2s ease;
      }

      .badge-card.is-collected .badge-card__image,
      .badge-card.is-magic .badge-card__image {
        filter:
          drop-shadow(0 0 8px rgba(95, 255, 214, 0.9))
          drop-shadow(0 0 20px rgba(255, 215, 106, 0.48));
        animation: badgeFloat 1.8s ease-in-out infinite alternate;
      }

      .badge-card__lock {
        position: absolute;
        display: grid;
        width: 72px;
        height: 34px;
        place-items: center;
        border: 2px solid var(--cream);
        background: rgba(5, 10, 22, 0.9);
        box-shadow: 3px 3px 0 #000;
        color: var(--cream);
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .badge-card.is-collected .badge-card__lock,
      .badge-card.is-magic .badge-card__lock {
        display: none;
      }

      .badge-card__body {
        position: relative;
        z-index: 1;
      }

      .badge-card__name {
        margin: 0;
        color: var(--cream);
        font-size: 15px;
        line-height: 1.25;
        text-shadow: 2px 2px 0 #000;
      }

      .badge-card__city {
        margin: 7px 0 0;
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
        line-height: 1.3;
        text-transform: uppercase;
      }

      .badge-card__state {
        display: inline-flex;
        margin-top: 10px;
        padding: 5px 7px;
        border: 2px solid #64748b;
        color: var(--muted);
        font-size: 10px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .badge-card.is-collected .badge-card__state {
        border-color: var(--green);
        color: var(--green);
      }

      .badge-card.is-magic .badge-card__state {
        border-color: var(--yellow);
        color: var(--yellow);
      }

      @keyframes badgeFloat {
        from {
          transform: translateY(0) scale(1);
        }

        to {
          transform: translateY(-6px) scale(1.025);
        }
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @keyframes islandFloat {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(calc(var(--float-distance, 12px) * -1));
        }
      }

      @media (max-width: 860px) {
        body {
          background-attachment: scroll;
        }

        .kingdom-page {
          width: min(100% - 24px, 760px);
          padding-top: 26px;
        }

        .world-selector {
          grid-template-columns: 1fr;
          gap: 16px;
          min-height: 0;
        }

        .nav-arrow {
          width: 58px;
        }

        .nav-arrow.prev {
          justify-self: start;
          grid-row: 2;
        }

        .nav-arrow.next {
          justify-self: end;
          grid-row: 2;
        }

        .island-window {
          grid-row: 1;
        }

        .island-track {
          gap: 8px;
        }

        .island-node {
          min-height: 260px;
        }

        .badge-collection-btn {
          top: auto;
          left: 18px;
          bottom: 18px;
          min-height: 50px;
          padding: 8px 10px;
        }

        .badge-grid {
          grid-template-columns: 1fr;
        }

        .badge-card {
          grid-template-columns: 150px 1fr;
          grid-template-rows: auto;
          align-items: center;
          text-align: left;
        }

        .badge-card__image-wrap {
          min-height: 132px;
        }

        .badge-card__image {
          max-height: 140px;
        }
      }

      @media (max-width: 560px) {
        .kingdom-page {
          width: min(100% - 18px, 440px);
        }

        .island-track {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 4px;
        }

        .island-node {
          min-height: 205px;
          padding-inline: 2px;
        }

        .island-node img {
          max-height: 132px;
        }

        .island-name {
          min-height: 46px;
          padding: 7px 6px;
          font-size: 11px;
        }

        .island-status,
        .lock-badge {
          font-size: 10px;
        }

        .badge-collection-panel {
          width: 100vw;
          padding: 22px 16px;
        }

        .badge-card {
          grid-template-columns: 112px 1fr;
          padding: 10px;
        }

        .badge-card__image-wrap {
          min-height: 108px;
        }

        .badge-card__image {
          max-height: 112px;
        }
      }
    </style>
  </head>
  <body>
    <main class="kingdom-page">
      <header class="kingdom-header">
        <h1><img class="kingdom-title-mark" src="res/favicon.webp" alt="" aria-hidden="true">SQL Kingdom</h1>
        <p>Choose your city and continue your SQL learning journey.</p>
      </header>

      <section class="world-selector" aria-label="SQL Kingdom city carousel">
        <button class="nav-arrow prev" type="button" id="prevIsland" aria-label="Show previous islands">&lt;</button>

        <div class="island-window">
          <div class="island-track" id="islandTrack"></div>
          <p class="carousel-note" id="carouselNote" aria-live="polite"></p>
        </div>

        <button class="nav-arrow next" type="button" id="nextIsland" aria-label="Show next islands">&gt;</button>
      </section>
    </main>


    <button class="badge-collection-btn" id="badgeCollectionBtn" type="button" aria-controls="badgeCollectionPanel" aria-expanded="false">
      <span class="badge-collection-btn__symbol" aria-hidden="true">★</span>
      <span class="badge-collection-btn__text">
        <span>Badges</span>
        <span class="badge-collection-count" id="badgeCollectionCount">0 / 3</span>
      </span>
    </button>

    <div class="badge-collection-backdrop" id="badgeCollectionBackdrop"></div>

    <aside class="badge-collection-panel" id="badgeCollectionPanel" role="dialog" aria-modal="true" aria-labelledby="badgeCollectionHeading" aria-hidden="true">
      <button class="badge-collection-close" id="badgeCollectionClose" type="button" aria-label="Close badge collection">X</button>
      <h2 class="badge-collection-heading" id="badgeCollectionHeading">Badge Collection</h2>
      <p class="badge-collection-summary" id="badgeCollectionSummary">Collected 0 of 3 playable badges.</p>
      <p class="badge-magic-note" id="badgeMagicNote" hidden>The Magic Master Key is active. Unfinished playable badges are shown as magically unlocked.</p>
      <div class="badge-grid" id="badgeGrid"></div>
    </aside>

    <div id="sharedMenuMount" data-menu-page="kingdom" data-menu-title="SQL Kingdom Menu"></div>
    <script src="shared_files/shared-progress.js"></script>
    <script src="shared_files/shared-reset-system.js"></script>
    <script src="shared_files/shared-magic-key.js"></script>
    <script src="shared_files/shared-menu.js"></script>
    <script>
      const islands = [
        {
          id: "foundation-city",
          name: "Foundation City",
          image: "res/kingdom/city_1.png",
          alt: "Foundation City island",
          type: "playable",
          link: "city_1/index_city_1.html"
        },
        {
          id: "data-prep-city",
          name: "Data Prep City",
          image: "res/kingdom/city_2.png",
          alt: "Data Prep City island",
          type: "playable",
          link: "city_2/index_city_2.html",
          lockedImage: "res/kingdom/shadow_island.png"
        },
        {
          id: "dataworks-citadel",
          name: "Dataworks Citadel",
          image: "res/kingdom/city_3.png",
          alt: "Dataworks Citadel floating clockwork islands",
          type: "playable",
          link: "city_3/index_city_3.html",
          lockedImage: "res/kingdom/shadow_island.png"
        },
        {
          id: "future-island-2",
          name: "Coming Soon",
          image: "res/kingdom/shadow_island.png",
          alt: "Locked future island",
          type: "coming-soon",
          link: null
        },
        {
          id: "future-island-3",
          name: "Coming Soon",
          image: "res/kingdom/shadow_island.png",
          alt: "Locked future island",
          type: "coming-soon",
          link: null
        }
      ];

      const visibleCount = 3;
      const islandTrack = document.querySelector("#islandTrack");
      const prevButton = document.querySelector("#prevIsland");
      const nextButton = document.querySelector("#nextIsland");
      const carouselNote = document.querySelector("#carouselNote");
      const badgeCollectionBtn = document.querySelector("#badgeCollectionBtn");
      const badgeCollectionCount = document.querySelector("#badgeCollectionCount");
      const badgeCollectionBackdrop = document.querySelector("#badgeCollectionBackdrop");
      const badgeCollectionPanel = document.querySelector("#badgeCollectionPanel");
      const badgeCollectionClose = document.querySelector("#badgeCollectionClose");
      const badgeCollectionSummary = document.querySelector("#badgeCollectionSummary");
      const badgeMagicNote = document.querySelector("#badgeMagicNote");
      const badgeGrid = document.querySelector("#badgeGrid");
      const maxIndex = Math.max(0, islands.length - visibleCount);
      let currentIndex = 0;
      let progress = window.SQLKingdomProgress.getGameProgress({ queueMigrationMessage: true });

      const badgeDefinitions = [
        {
          id: "sql-foundations",
          name: "SQL Foundations Badge",
          city: "Foundation City",
          image: "res/city_1/item/badge.webp",
          earned(progressState) {
            return Boolean(
              progressState?.badges?.sqlFoundations ||
              progressState?.buildings?.queryLab?.completed
            );
          }
        },
        {
          id: "data-prep-city",
          name: "Data Prep City Badge",
          city: "Data Prep City",
          image: "res/city_2/item/badge.webp",
          earned(progressState) {
            return Boolean(
              progressState?.cities?.dataPrepCity?.completed ||
              progressState?.cities?.dataPrepCity?.badge ||
              progressState?.cities?.dataPrepCity?.buildings?.cleaningClinic?.completed
            );
          }
        },
        {
          id: "dataworks-citadel",
          name: "Dataworks Citadel Badge",
          city: "Dataworks Citadel",
          image: "res/city_3/item/badge.webp",
          earned(progressState) {
            return Boolean(
              progressState?.cities?.dataworksCitadel?.completed ||
              progressState?.cities?.dataworksCitadel?.badge ||
              progressState?.cities?.dataworksCitadel?.buildings?.sqlalchemyEngineRoom?.completed
            );
          }
        }
      ];

      function badgeDisplayState(definition, progressState) {
        const earned = definition.earned(progressState);
        const magicUnlocked = !earned && progressState?.unlockEverythingUsed === true;
        return {
          collected: earned || magicUnlocked,
          earned,
          magicUnlocked
        };
      }

      function renderBadges(progressState = progress) {
        const states = badgeDefinitions.map((definition) => ({
          definition,
          ...badgeDisplayState(definition, progressState)
        }));
        const collectedCount = states.filter((state) => state.collected).length;

        badgeCollectionCount.textContent = `${collectedCount} / ${badgeDefinitions.length}`;
        badgeCollectionBtn.setAttribute(
          "aria-label",
          `Open badge collection, ${collectedCount} of ${badgeDefinitions.length} collected`
        );
        badgeCollectionSummary.textContent = `Collected ${collectedCount} of ${badgeDefinitions.length} playable badges.`;
        badgeMagicNote.hidden = progressState?.unlockEverythingUsed !== true;
        badgeGrid.replaceChildren();

        states.forEach(({ definition, collected, magicUnlocked }) => {
          const card = document.createElement("article");
          card.className = "badge-card";
          card.classList.toggle("is-collected", collected && !magicUnlocked);
          card.classList.toggle("is-magic", magicUnlocked);
          card.dataset.badgeId = definition.id;

          const imageWrap = document.createElement("div");
          imageWrap.className = "badge-card__image-wrap";

          const image = document.createElement("img");
          image.className = "badge-card__image";
          image.src = definition.image;
          image.alt = "";
          image.setAttribute("aria-hidden", "true");

          const lock = document.createElement("span");
          lock.className = "badge-card__lock";
          lock.textContent = "Locked";

          const body = document.createElement("div");
          body.className = "badge-card__body";

          const name = document.createElement("h3");
          name.className = "badge-card__name";
          name.textContent = definition.name;

          const city = document.createElement("p");
          city.className = "badge-card__city";
          city.textContent = definition.city;

          const stateLabel = document.createElement("span");
          stateLabel.className = "badge-card__state";
          stateLabel.textContent = magicUnlocked ? "Magic Unlocked" : collected ? "Collected" : "Locked";

          imageWrap.append(image, lock);
          body.append(name, city, stateLabel);
          card.append(imageWrap, body);
          badgeGrid.appendChild(card);
        });
      }

      function openBadgeCollection() {
        window.SQLKingdomMenu?.closeMenu?.();
        badgeCollectionPanel.classList.add("open");
        badgeCollectionBackdrop.classList.add("open");
        badgeCollectionPanel.setAttribute("aria-hidden", "false");
        badgeCollectionBtn.setAttribute("aria-expanded", "true");
        badgeCollectionClose.focus();
      }

      function closeBadgeCollection() {
        const wasOpen = badgeCollectionPanel.classList.contains("open");
        badgeCollectionPanel.classList.remove("open");
        badgeCollectionBackdrop.classList.remove("open");
        badgeCollectionPanel.setAttribute("aria-hidden", "true");
        badgeCollectionBtn.setAttribute("aria-expanded", "false");
        if (wasOpen) badgeCollectionBtn.focus();
      }

      function refreshKingdomFromStorage() {
        progress = window.SQLKingdomProgress.getGameProgress({ queueMigrationMessage: true });
        renderIslands();
        renderBadges(progress);
      }

      function showUnlockToast(message) {
        if (!message) return;
        window.SQLKingdomMenu?.showToast(message);
      }

      function consumePendingUnlockMessage() {
        showUnlockToast(window.SQLKingdomProgress.consumePendingUnlockMessage());
      }

      function renderIslands() {
        progress = window.SQLKingdomProgress.getGameProgress({ queueMigrationMessage: true });
        const visibleIslands = islands.slice(currentIndex, currentIndex + visibleCount);
        islandTrack.replaceChildren();

        visibleIslands.forEach((island, position) => {
          const isUnlocked = island.type === "playable" && window.SQLKingdomProgress.isIslandUnlocked(island.id, progress);
          const islandState = isUnlocked ? "unlocked" : island.type === "playable" ? "locked-playable" : "coming-soon";
          const element = document.createElement(isUnlocked ? "a" : "article");
          element.className = `island-node is-${islandState}`;
          element.style.setProperty("--float-delay", `${position * 0.4}s`);
          element.style.setProperty("--float-distance", `${10 + position * 2}px`);

          if (isUnlocked) {
            element.href = island.link;
            element.setAttribute("aria-label", `Enter ${island.name}`);
          } else {
            element.setAttribute("aria-disabled", "true");
          }

          const imageWrap = document.createElement("div");
          imageWrap.className = "island-image-wrap";

          const image = document.createElement("img");
          image.src = isUnlocked ? island.image : island.lockedImage || "res/kingdom/shadow_island.png";
          image.alt = isUnlocked ? island.alt : "Locked island";

          imageWrap.appendChild(image);

          if (!isUnlocked) {
            const lockBadge = document.createElement("span");
            lockBadge.className = "lock-badge";
            lockBadge.textContent = islandState === "coming-soon" ? "SOON" : "LOCKED";
            imageWrap.appendChild(lockBadge);
          }

          const name = document.createElement("span");
          name.className = "island-name";
          if (isUnlocked) {
            name.textContent = island.name;
          } else {
            name.innerHTML = `<span>????</span><span class="island-status">${islandState === "coming-soon" ? "COMING SOON" : "LOCKED"}</span>`;
          }

          element.append(imageWrap, name);
          islandTrack.appendChild(element);
        });

        prevButton.disabled = currentIndex === 0;
        nextButton.disabled = currentIndex === maxIndex;
        carouselNote.textContent = `Showing islands ${currentIndex + 1}-${currentIndex + visibleIslands.length} of ${islands.length}`;
      }

      prevButton.addEventListener("click", () => {
        currentIndex = Math.max(0, currentIndex - 1);
        renderIslands();
      });

      nextButton.addEventListener("click", () => {
        currentIndex = Math.min(maxIndex, currentIndex + 1);
        renderIslands();
      });

      window.addEventListener("sqlKingdom:unlockAll", (event) => {
        progress = event.detail.progress;
        showUnlockToast(event.detail.message);
        renderIslands();
        renderBadges(progress);
      });

      window.addEventListener("sqlKingdom:reset", (event) => {
        progress = event.detail.progress;
        showUnlockToast(event.detail.message);
        currentIndex = 0;
        renderIslands();
        renderBadges(progress);
      });

      badgeCollectionBtn.addEventListener("click", openBadgeCollection);
      badgeCollectionClose.addEventListener("click", closeBadgeCollection);
      badgeCollectionBackdrop.addEventListener("click", closeBadgeCollection);
      document.querySelector("#sharedBurgerBtn")?.addEventListener("click", closeBadgeCollection);

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeBadgeCollection();
      });

      window.addEventListener("pageshow", refreshKingdomFromStorage);
      window.addEventListener("storage", (event) => {
        if (event.key === window.SQLKingdomProgress.STORAGE_KEY) {
          refreshKingdomFromStorage();
        }
      });

      renderIslands();
      renderBadges(progress);
      consumePendingUnlockMessage();
      showUnlockToast(window.SQLKingdomResetSystem?.consumeGuardMessage());
    </script>
  </body>
</html>
