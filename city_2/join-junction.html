<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join Junction | Data Prep City</title>
    <link rel="shortcut icon" href="../res/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../shared_files/shared-room-layout.css" />
    <link rel="stylesheet" href="../shared_files/shared-room-components.css" />
    <style>
      .side-panel h1 { font-size: 28px; }
      .marker-rail { left: 65%; top: 75%; }
      .marker-connector { left: 23%; top: 50%; }
      .marker-merger { left: 49%; top: 68%; }

      .room-stage.is-welcome-room .info-card {
        top: 12px;
      }

      @media (max-width: 760px) {
        .side-panel h1 { font-size: 24px; }
      }
    </style>
  </head>
  <body>
    <main class="room-layout">
      <aside class="side-panel">
        <h1>Join Junction</h1>
        <p class="room-counter" id="roomCounter">Current Room: 0 / 7</p>
        <p class="path-title">Learning Path</p>
        <div class="lesson-list" id="roomList"></div>
        <article class="lesson-card" id="lessonCard">
          <h2 id="lessonTitle">Welcoming Room</h2>
          <div class="room-summary" id="lessonText"></div>
        </article>
      </aside>

      <section class="room-stage" aria-label="Join Junction rooms">
        <img class="room-bg" id="roomBg" src="../res/city_2/rooms_background/Join_Junction.webp" alt="" />
        <a class="return-city-btn" id="topReturn" href="index_city_2.html">Back to Data Prep City</a>
        <div class="hotspots" id="hotspots">
          <button class="info-marker marker-rail" type="button" data-marker-id="rail" aria-label="Join rail switch info"></button>
          <button class="info-marker marker-connector" type="button" data-marker-id="connector" aria-label="Table connector info"></button>
          <button class="info-marker marker-merger" type="button" data-marker-id="merger" aria-label="Dataset merger info"></button>
        </div>
        <div class="marker-tooltip" id="markerTooltip" aria-hidden="true">
          <h3 id="markerTooltipTitle"></h3>
          <p id="markerTooltipText"></p>
        </div>
        <div class="room-nav">
          <button class="pixel-btn" id="prevRoom" type="button">Previous</button>
          <button class="pixel-btn" id="nextRoom" type="button">Next</button>
          <a class="pixel-btn" id="finalReturn" href="index_city_2.html" hidden>Back to Data Prep City</a>
        </div>
        <article class="info-card" id="infoCard" aria-live="polite">
          <div id="mainLessonContent"></div>
        </article>
        <article class="reward-modal" id="rewardModal" hidden>
          <div class="reward-card">
            <img src="../res/city_2/item/regular-key.webp" class="reward-key-img" alt="Subquery Mines Key">
            <h2 id="rewardTitle">Subquery Mines Key</h2>
            <p id="rewardMessage">You received the Subquery Mines Key.</p>
            <button class="pixel-btn" id="rewardContinue" type="button">Continue</button>
          </div>
        </article>
      </section>
    </main>

    <script src="../shared_files/shared-progress.js"></script>
    <script src="../shared_files/shared-reset-system.js"></script>
    <script>
      const canOpenJoinJunction = window.SQLKingdomResetSystem?.guardDataPrepBuildingAccess?.("joinJunction", "index_city_2.html", "Complete Summary Tower first.", "../index.html") ?? true;
      const QUIZ_ADVANCE_DELAY_MS = 380;

      // Data Prep City examples use international neutral sample data.
      const rooms = [
        {
          title: "Welcoming Room",
          image: "../res/city_2/rooms_background/Join_Junction.webp",
          type: "welcome",
          summary: "JOINs combine related tables into one useful dataset.",
          points: ["Join Rail Switch", "Table Connector", "Dataset Merger"],
          contentHtml: `
            <h2>Welcome to Join Junction</h2>
            <p>JOINs are the way SQL combines related tables.</p>
            <p>Explore the glowing markers to inspect the junction tools before starting the lesson path.</p>
            <ul>
              <li>Related columns connect tables.</li>
              <li>JOINs bring connected data into one result.</li>
              <li>Combined data is useful for reports, analysis, and ML features.</li>
            </ul>
          `
        },
        {
          title: "Why JOINs Matter",
          image: "../res/city_2/rooms_background/Join_Junction_room.webp",
          type: "lesson",
          summary: "Real data is often split across multiple related tables.",
          points: ["Customers can live in one table", "Orders can live in another table", "customer_id connects them"],
          contentHtml: `
            <h2>Why JOINs Matter</h2>
            <p>Real data is often split across multiple tables. One table may store customers, while another table stores orders.</p>
            <h3>customers</h3>
            <table class="result-table">
              <thead><tr><th>customer_id</th><th>name</th><th>city</th></tr></thead>
              <tbody>
                <tr><td>1</td><td>Emma</td><td>London</td></tr>
                <tr><td>2</td><td>Noah</td><td>Toronto</td></tr>
                <tr><td>3</td><td>Sofia</td><td>Madrid</td></tr>
              </tbody>
            </table>
            <h3>orders</h3>
            <table class="result-table">
              <thead><tr><th>order_id</th><th>customer_id</th><th>price</th></tr></thead>
              <tbody>
                <tr><td>101</td><td>1</td><td>120</td></tr>
                <tr><td>102</td><td>1</td><td>80</td></tr>
                <tr><td>103</td><td>2</td><td>50</td></tr>
              </tbody>
            </table>
            <p><code>customer_id</code> connects both tables. JOINs help us see customer information together with order information.</p>
            <div class="pixel-box">This is useful when preparing data for reports, dashboards, analysis, or machine learning.</div>
          `
        },
        {
          title: "INNER JOIN",
          image: "../res/city_2/rooms_background/Join_Junction_room.webp",
          type: "lesson",
          summary: "INNER JOIN keeps only rows that match in both tables.",
          points: ["Matches customers with orders", "Drops unmatched customers", "Drops unmatched orders"],
          contentHtml: `
            <h2>INNER JOIN</h2>
            <p><strong>INNER JOIN</strong> keeps only rows that match in both tables.</p>
            <pre class="sql-code"><code>SELECT customers.name, customers.city, orders.price
FROM customers
INNER JOIN orders
ON customers.customer_id = orders.customer_id;</code></pre>
            <p>This matches customers with their orders. Only matching records are returned.</p>
            <p>In the example dataset, Sofia does not appear if she has no order.</p>
            <div class="pixel-box">Use INNER JOIN when you only want connected records from both sides.</div>
          `
        },
        {
          title: "LEFT JOIN and RIGHT JOIN",
          image: "../res/city_2/rooms_background/Join_Junction_room.webp",
          type: "lesson",
          summary: "LEFT JOIN and RIGHT JOIN keep all rows from one side.",
          points: ["LEFT JOIN keeps the left table", "RIGHT JOIN keeps the right table", "Missing matches become NULL"],
          contentHtml: `
            <h2>LEFT JOIN and RIGHT JOIN</h2>
            <p><strong>LEFT JOIN</strong> keeps all rows from the left table and adds matching rows from the right table.</p>
            <pre class="sql-code"><code>SELECT customers.name, customers.city, orders.price
FROM customers
LEFT JOIN orders
ON customers.customer_id = orders.customer_id;</code></pre>
            <p>This shows all customers, even customers with no orders. If a customer has no order, the order price will be NULL.</p>
            <p><strong>RIGHT JOIN</strong> keeps all rows from the right table and adds matching rows from the left table.</p>
            <pre class="sql-code"><code>SELECT customers.name, orders.order_id, orders.price
FROM customers
RIGHT JOIN orders
ON customers.customer_id = orders.customer_id;</code></pre>
            <p>RIGHT JOIN is like LEFT JOIN but starts from the right table. Many projects prefer rewriting RIGHT JOIN as LEFT JOIN for readability, but learners should recognize it.</p>
          `
        },
        {
          title: "FULL OUTER JOIN",
          image: "../res/city_2/rooms_background/Join_Junction_room.webp",
          type: "lesson",
          summary: "FULL OUTER JOIN keeps all rows from both tables.",
          points: ["Keeps matching rows", "Keeps unmatched left rows", "Keeps unmatched right rows"],
          contentHtml: `
            <h2>FULL OUTER JOIN</h2>
            <p><strong>FULL OUTER JOIN</strong> keeps all rows from both tables.</p>
            <pre class="sql-code"><code>SELECT customers.name, orders.order_id, orders.price
FROM customers
FULL OUTER JOIN orders
ON customers.customer_id = orders.customer_id;</code></pre>
            <p>Matching rows are combined. Non-matching rows still appear with NULL values.</p>
            <p>This is useful when we want to inspect all records from both sides. It helps find customers without orders and orders without matching customers.</p>
            <div class="pixel-box">Some databases support FULL OUTER JOIN directly; some may need alternatives.</div>
          `
        },
        {
          title: "JOINs for Data Preparation",
          image: "../res/city_2/rooms_background/Join_Junction_room.webp",
          type: "lesson",
          summary: "JOINs create richer datasets from related tables.",
          points: ["Combine customer profiles with orders", "Add product details to sales", "Build richer ML features"],
          contentHtml: `
            <h2>JOINs for Data Preparation</h2>
            <p>JOINs help before analysis or machine learning because they connect related information.</p>
            <ul>
              <li>Combine customer profiles with orders.</li>
              <li>Add product details to sales.</li>
              <li>Merge employee records with departments.</li>
              <li>Connect transaction data with user data.</li>
              <li>Create one useful dataset from many related tables.</li>
              <li>Build richer ML features.</li>
            </ul>
            <pre class="sql-code"><code>SELECT customers.customer_id,
       customers.city,
       COUNT(orders.order_id) AS total_orders,
       SUM(orders.price) AS total_spent
FROM customers
LEFT JOIN orders
ON customers.customer_id = orders.customer_id
GROUP BY customers.customer_id, customers.city;</code></pre>
            <p>This starts with all customers, attaches their orders when available, counts orders per customer, and calculates total spending.</p>
            <p>It keeps customers even if they have no orders.</p>
            <div class="pixel-box">This kind of joined and summarized table can become useful feature data for machine learning.</div>
          `
        },
        {
          title: "Quiz Room",
          image: "../res/city_2/rooms_background/Join_Junction_room.webp",
          type: "quiz",
          summary: "Test JOIN types before unlocking the recap.",
          points: ["Six questions", "Randomized answer order", "Correct answers unlock the recap"],
          contentHtml: `
            <h2>Quiz Room</h2>
            <p>Answer every question correctly to unlock the recap room.</p>
            <div class="quiz-box">
              <article class="quiz-question" data-question-id="inner">
                <h3>Question 1</h3>
                <p>Which JOIN keeps only matching rows from both tables?</p>
                <button class="quiz-option" type="button" data-correct="true">INNER JOIN</button>
                <button class="quiz-option" type="button">LEFT JOIN</button>
                <button class="quiz-option" type="button">RIGHT JOIN</button>
                <button class="quiz-option" type="button">FULL OUTER JOIN</button>
              </article>
              <article class="quiz-question" data-question-id="left">
                <h3>Question 2</h3>
                <p>Which JOIN keeps all rows from the left table?</p>
                <button class="quiz-option" type="button" data-correct="true">LEFT JOIN</button>
                <button class="quiz-option" type="button">INNER JOIN</button>
                <button class="quiz-option" type="button">RIGHT JOIN</button>
                <button class="quiz-option" type="button">GROUP BY</button>
              </article>
              <article class="quiz-question" data-question-id="key">
                <h3>Question 3</h3>
                <p>What column is commonly used to connect customers and orders?</p>
                <button class="quiz-option" type="button" data-correct="true">customer_id</button>
                <button class="quiz-option" type="button">price</button>
                <button class="quiz-option" type="button">city</button>
                <button class="quiz-option" type="button">order_total</button>
              </article>
              <article class="quiz-question" data-question-id="null">
                <h3>Question 4</h3>
                <p>What value appears when a LEFT JOIN has no match on the right side?</p>
                <button class="quiz-option" type="button" data-correct="true">NULL</button>
                <button class="quiz-option" type="button">0</button>
                <button class="quiz-option" type="button">FALSE</button>
                <button class="quiz-option" type="button">A duplicate row</button>
              </article>
              <article class="quiz-question" data-question-id="full">
                <h3>Question 5</h3>
                <p>Which JOIN keeps all rows from both tables?</p>
                <button class="quiz-option" type="button" data-correct="true">FULL OUTER JOIN</button>
                <button class="quiz-option" type="button">INNER JOIN</button>
                <button class="quiz-option" type="button">LEFT JOIN only</button>
                <button class="quiz-option" type="button">WHERE JOIN</button>
              </article>
              <article class="quiz-question" data-question-id="prep">
                <h3>Question 6</h3>
                <p>Why are JOINs useful in data preparation?</p>
                <button class="quiz-option" type="button" data-correct="true">They combine related tables into a richer dataset</button>
                <button class="quiz-option" type="button">They remove the need for keys</button>
                <button class="quiz-option" type="button">They only sort rows alphabetically</button>
                <button class="quiz-option" type="button">They automatically create charts</button>
              </article>
            </div>
            <p class="quiz-feedback"></p>
          `
        },
        {
          title: "Recap Room",
          image: "../res/city_2/rooms_background/Join_Junction_room.webp",
          type: "lesson",
          summary: "You learned how SQL combines related tables.",
          points: ["JOIN types reviewed", "Data preparation purpose", "Subquery Mines Key reward"],
          contentHtml: `
            <h2>Recap Room</h2>
            <p>You finished Join Junction. You can now combine related tables into analysis-ready datasets.</p>
            <ul>
              <li>JOINs combine related tables.</li>
              <li><strong>INNER JOIN</strong> keeps only matching rows.</li>
              <li><strong>LEFT JOIN</strong> keeps all rows from the left table.</li>
              <li><strong>RIGHT JOIN</strong> keeps all rows from the right table.</li>
              <li><strong>FULL OUTER JOIN</strong> keeps all rows from both tables.</li>
              <li>JOINs help build richer datasets for analysis and machine learning.</li>
            </ul>
            <p class="reward-note">Reward unlocked: Subquery Mines Key.</p>
          `
        }
      ];

      const welcomeMarkers = [
        { id: "rail", title: "Join Rail Switch", text: "JOINs connect rows from different tables using related columns." },
        { id: "connector", title: "Table Connector", text: "A key column, like customer_id, helps match records between tables." },
        { id: "merger", title: "Dataset Merger", text: "Combining tables can create richer datasets for analysis and machine learning." }
      ];

      const TEMPLATE_KEY = "joinJunction";
      let currentRoomIndex = 0;
      let currentQuizIndex = 0;
      let discoveryCompleteAnimationPlayed = false;
      let progress = getProgress();
      let suppressAutoCompletion = false;

      const roomBg = document.querySelector("#roomBg");
      const roomStage = document.querySelector(".room-stage");
      const roomCounter = document.querySelector("#roomCounter");
      const hotspots = document.querySelector("#hotspots");
      const prevRoom = document.querySelector("#prevRoom");
      const nextRoom = document.querySelector("#nextRoom");
      const topReturn = document.querySelector("#topReturn");
      const finalReturn = document.querySelector("#finalReturn");
      const roomList = document.querySelector("#roomList");
      const lessonTitle = document.querySelector("#lessonTitle");
      const lessonText = document.querySelector("#lessonText");
      const mainLessonContent = document.querySelector("#mainLessonContent");
      const rewardModal = document.querySelector("#rewardModal");
      const rewardContinue = document.querySelector("#rewardContinue");
      const markerTooltip = document.querySelector("#markerTooltip");
      const markerTooltipTitle = document.querySelector("#markerTooltipTitle");
      const markerTooltipText = document.querySelector("#markerTooltipText");

      function getProgress() {
        return window.SQLKingdomProgress.getGameProgress();
      }

      function saveProgress(progressToSave) {
        window.SQLKingdomProgress.saveGameProgress(progressToSave);
      }

      function templateProgress() {
        progress.cities = progress.cities || {};
        progress.cities.dataPrepCity = progress.cities.dataPrepCity || {};
        progress.cities.dataPrepCity[TEMPLATE_KEY] = progress.cities.dataPrepCity[TEMPLATE_KEY] || {
          discoveredMarkers: [],
          highestRoomUnlocked: 0,
          quizPassed: false,
          completed: false,
          correctQuizAnswers: []
        };
        if (!Array.isArray(progress.cities.dataPrepCity[TEMPLATE_KEY].discoveredMarkers)) {
          progress.cities.dataPrepCity[TEMPLATE_KEY].discoveredMarkers = [];
        }
        if (!Array.isArray(progress.cities.dataPrepCity[TEMPLATE_KEY].correctQuizAnswers)) {
          progress.cities.dataPrepCity[TEMPLATE_KEY].correctQuizAnswers = [];
        }
        return progress.cities.dataPrepCity[TEMPLATE_KEY];
      }

      function markerIds() {
        return welcomeMarkers.map((marker) => marker.id);
      }

      function discoveredMarkers() {
        const template = templateProgress();
        if (!Array.isArray(template.discoveredMarkers)) template.discoveredMarkers = [];
        return template.discoveredMarkers;
      }

      function discoveryCount() {
        const validMarkerIds = markerIds();
        return discoveredMarkers().filter((id) => validMarkerIds.includes(id)).length;
      }

      function allWelcomeMarkersDiscovered() {
        const discovered = discoveredMarkers();
        return welcomeMarkers.every((marker) => discovered.includes(marker.id));
      }

      function getWelcomeMarker(markerId) {
        return welcomeMarkers.find((marker) => marker.id === markerId);
      }

      function renderMainContent(contentHtml) {
        mainLessonContent.innerHTML = contentHtml;
      }

      function renderWelcomeContent(message = "", animateComplete = false) {
        const complete = allWelcomeMarkersDiscovered();
        const shouldAnimate = complete && animateComplete && !discoveryCompleteAnimationPlayed;
        const statusClass = complete ? `discovery-complete${shouldAnimate ? " animate-complete" : ""}` : "discovery-status";
        const statusText = complete ? "All junction objects discovered! You can enter the next room." : `Objects discovered: ${discoveryCount()} / ${welcomeMarkers.length}`;
        const warning = message ? `<p class="discovery-warning">${message}</p>` : "";
        return `
          <h2>Welcome to Join Junction</h2>
          <p>Explore every glowing object marker before starting the JOIN path.</p>
          <p class="${statusClass}">${statusText}</p>
          ${complete ? "" : `<p class="discovery-hint">Hover or click each marker to discover it.</p>`}
          ${warning}
        `;
      }

      function renderWelcomeSidebarSummary() {
        const complete = allWelcomeMarkersDiscovered();
        lessonTitle.textContent = rooms[0].title;
        lessonText.innerHTML = `
          <p>${rooms[0].summary}</p>
          <ul>
            <li>Objects discovered: ${discoveryCount()} / ${welcomeMarkers.length}</li>
            <li>${complete ? "Next Room unlocked." : "Discover all junction objects to unlock Room 1."}</li>
          </ul>
        `;
      }

      function updateMarkerStates() {
        const discovered = discoveredMarkers();
        document.querySelectorAll(".info-marker").forEach((markerElement) => {
          const markerData = getWelcomeMarker(markerElement.dataset.markerId);
          const isDiscovered = discovered.includes(markerElement.dataset.markerId);
          markerElement.classList.toggle("is-discovered", isDiscovered);
          if (markerData) markerElement.setAttribute("aria-label", `${markerData.title} ${isDiscovered ? "discovered" : "not discovered"}`);
        });
      }

      function unlockFirstLessonIfReady() {
        if (!allWelcomeMarkersDiscovered()) return false;
        const template = templateProgress();
        const unlockedNow = template.highestRoomUnlocked < 1;
        template.highestRoomUnlocked = Math.max(template.highestRoomUnlocked, 1);
        saveProgress(progress);
        return unlockedNow;
      }

      function markWelcomeMarkerDiscovered(markerId) {
        const markerData = getWelcomeMarker(markerId);
        if (!markerData) return;
        const wasComplete = allWelcomeMarkersDiscovered();
        const discovered = discoveredMarkers();
        if (!discovered.includes(markerId)) {
          discovered.push(markerId);
          saveProgress(progress);
        }
        const isComplete = allWelcomeMarkersDiscovered();
        if (isComplete) unlockFirstLessonIfReady();
        updateMarkerStates();
        if (currentRoomIndex === 0) {
          const shouldAnimateComplete = isComplete && !wasComplete && !discoveryCompleteAnimationPlayed;
          renderWelcomeSidebarSummary();
          renderMainContent(renderWelcomeContent("", shouldAnimateComplete));
          if (shouldAnimateComplete) discoveryCompleteAnimationPlayed = true;
          renderRoomList();
          updateNextButtonState();
        }
      }

      function showMarkerTooltip(markerElement, markerData) {
        markerTooltipTitle.textContent = markerData.title;
        markerTooltipText.textContent = markerData.text;
        markerTooltip.classList.add("is-visible");
        markerTooltip.setAttribute("aria-hidden", "false");
        const stageRect = roomStage.getBoundingClientRect();
        const markerRect = markerElement.getBoundingClientRect();
        const tooltipRect = markerTooltip.getBoundingClientRect();
        let left = markerRect.left - stageRect.left + markerRect.width / 2 - tooltipRect.width / 2;
        let top = markerRect.top - stageRect.top - tooltipRect.height - 14;
        if (top < 10) top = markerRect.bottom - stageRect.top + 14;
        left = Math.max(10, Math.min(left, stageRect.width - tooltipRect.width - 10));
        top = Math.max(10, Math.min(top, stageRect.height - tooltipRect.height - 10));
        markerTooltip.style.left = `${left}px`;
        markerTooltip.style.top = `${top}px`;
      }

      function hideMarkerTooltip() {
        markerTooltip.classList.remove("is-visible");
        markerTooltip.setAttribute("aria-hidden", "true");
      }

      function handleMarkerEnter(markerElement) {
        if (currentRoomIndex !== 0) return;
        const markerData = getWelcomeMarker(markerElement.dataset.markerId);
        if (!markerData) return;
        markWelcomeMarkerDiscovered(markerData.id);
        showMarkerTooltip(markerElement, markerData);
      }

      function updateNextButtonState() {
        const locked = currentRoomIndex === 0 && !allWelcomeMarkersDiscovered();
        nextRoom.classList.toggle("is-disabled", locked);
        nextRoom.setAttribute("aria-disabled", locked ? "true" : "false");
      }

      function updateCounter() {
        roomCounter.textContent = `Current Room: ${currentRoomIndex} / ${rooms.length - 1}`;
      }

      function formatRoomTitle(room, index) {
        return index === 0 ? "0. Welcoming Room" : `${String(index).padStart(2, "0")}. ${room.title}`;
      }

      function isRecapRoom(index) {
        return index === rooms.length - 1;
      }

      function canEnterRoom(index) {
        const template = templateProgress();
        if (index === 1 && !allWelcomeMarkersDiscovered()) return false;
        if (isRecapRoom(index) && !template.quizPassed) return false;
        return index <= template.highestRoomUnlocked;
      }

      function roomLockedMessage(index) {
        if (index === 1 && !allWelcomeMarkersDiscovered()) return "Discover all welcome-room junction objects first.";
        if (isRecapRoom(index) && !templateProgress().quizPassed) return "Complete the quiz first to unlock the recap room.";
        return "Explore previous rooms first to unlock this room.";
      }

      function renderRoomList() {
        roomList.innerHTML = "";
        rooms.forEach((room, index) => {
          const tab = document.createElement("button");
          tab.type = "button";
          tab.className = "room-tab";
          tab.textContent = formatRoomTitle(room, index);
          const isUnlocked = canEnterRoom(index);
          if (!isUnlocked) tab.classList.add("locked");
          if (index === currentRoomIndex) tab.classList.add("active");
          tab.addEventListener("click", () => {
            if (!isUnlocked) {
              const message = roomLockedMessage(index);
              lessonTitle.textContent = "Room locked";
              lessonText.innerHTML = `<p>${message}</p>`;
              renderMainContent(`<h2>Room locked</h2><p>${message}</p>`);
              return;
            }
            currentRoomIndex = index;
            renderRoom();
          });
          roomList.appendChild(tab);
        });
      }

      function renderSidebarSummary(room) {
        lessonTitle.textContent = room.title;
        lessonText.innerHTML = `<p>${room.summary}</p><ul>${room.points.map((point) => `<li>${point}</li>`).join("")}</ul>`;
      }

      function setQuizFeedback(message) {
        const feedback = mainLessonContent.querySelector(".quiz-feedback");
        if (feedback) feedback.textContent = message;
      }

      function shuffleArray(array) {
        const copy = [...array];
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function optionTextWithoutLetter(text) {
        return text.replace(/^[A-D]\.\s*/, "");
      }

      function quizQuestions() {
        return Array.from(mainLessonContent.querySelectorAll(".quiz-question"));
      }

      function quizQuestionIds() {
        return quizQuestions().map((question) => question.dataset.questionId);
      }

      function completedQuizQuestionCount() {
        const template = templateProgress();
        return quizQuestionIds().filter((id) => template.correctQuizAnswers.includes(id)).length;
      }

      function renderQuizTabs() {
        const quizBox = mainLessonContent.querySelector(".quiz-box");
        const questions = quizQuestions();
        if (!quizBox || questions.length <= 1) return;

        let tabs = mainLessonContent.querySelector(".quiz-tabs");
        if (!tabs) {
          tabs = document.createElement("div");
          tabs.className = "quiz-tabs";
          tabs.setAttribute("role", "tablist");
          tabs.setAttribute("aria-label", "Quiz questions");
          quizBox.insertBefore(tabs, quizBox.firstElementChild);
        }

        const template = templateProgress();
        currentQuizIndex = Math.max(0, Math.min(currentQuizIndex, questions.length - 1));
        tabs.innerHTML = "";

        questions.forEach((question, index) => {
          const questionId = question.dataset.questionId;
          const isActive = index === currentQuizIndex;
          const isComplete = template.correctQuizAnswers.includes(questionId);
          question.classList.add("quiz-question-panel");
          question.hidden = !isActive;
          question.classList.toggle("is-active", isActive);

          const tab = document.createElement("button");
          tab.type = "button";
          tab.className = "quiz-tab";
          tab.textContent = `Quiz ${index + 1}`;
          tab.setAttribute("role", "tab");
          tab.setAttribute("aria-selected", isActive ? "true" : "false");
          tab.classList.toggle("is-active", isActive);
          tab.classList.toggle("is-complete", isComplete);
          tab.addEventListener("click", () => {
            currentQuizIndex = index;
            renderQuizTabs();
            updateQuizFeedback();
          });
          tabs.appendChild(tab);
        });
      }

      function goToNextUnansweredQuizQuestion() {
        const template = templateProgress();
        const questions = quizQuestions();
        const nextIndex = questions.findIndex((question) => !template.correctQuizAnswers.includes(question.dataset.questionId));
        if (nextIndex !== -1) currentQuizIndex = nextIndex;
      }

      function shuffleQuizOptions() {
        quizQuestions().forEach((question) => {
          if (question.dataset.shuffled === "true") return;
          const options = Array.from(question.querySelectorAll(".quiz-option"));
          const optionData = options.map((option) => ({
            text: optionTextWithoutLetter(option.textContent),
            correct: option.dataset.correct === "true"
          }));

          shuffleArray(optionData).forEach((data, index) => {
            const option = options[index];
            option.textContent = `${String.fromCharCode(65 + index)}. ${data.text}`;
            if (data.correct) option.dataset.correct = "true";
            else delete option.dataset.correct;
            question.appendChild(option);
          });
          question.dataset.shuffled = "true";
        });
      }

      function updateQuizFeedback() {
        const template = templateProgress();
        const total = quizQuestionIds().length;
        const correct = completedQuizQuestionCount();
        if (template.quizPassed) {
          setQuizFeedback("Correct! The recap room is unlocked.");
          return;
        }
        setQuizFeedback(`Answer all quiz questions correctly to continue. Progress: ${correct} / ${total}.`);
      }

      function bindQuizOptions() {
        if (rooms[currentRoomIndex].type !== "quiz") return;
        shuffleQuizOptions();
        const template = templateProgress();
        renderQuizTabs();
        const allQuestionsAlreadyCorrect = quizQuestionIds().every((id) => template.correctQuizAnswers.includes(id));
        if (allQuestionsAlreadyCorrect && !template.quizPassed) {
          template.quizPassed = true;
          template.highestRoomUnlocked = Math.max(template.highestRoomUnlocked, currentRoomIndex + 1);
          saveProgress(progress);
        }

        quizQuestions().forEach((question) => {
          const questionId = question.dataset.questionId;
          const isComplete = template.correctQuizAnswers.includes(questionId);
          question.classList.toggle("is-complete", isComplete);
          question.querySelectorAll(".quiz-option").forEach((option) => {
            const isCorrect = option.dataset.correct === "true";
            option.classList.toggle("correct", isComplete && isCorrect);
            option.disabled = isComplete || template.quizPassed;
            option.addEventListener("click", () => handleQuizAnswer(option));
          });
        });

        updateQuizFeedback();
      }

      function handleQuizAnswer(option) {
        if (option.disabled) return;
        const question = option.closest(".quiz-question");
        if (!question) return;

        const questionId = question.dataset.questionId;
        const questionOptions = question.querySelectorAll(".quiz-option");
        questionOptions.forEach((item) => item.classList.remove("wrong"));
        question.classList.remove("is-transitioning");

        if (option.dataset.correct !== "true") {
          option.classList.add("wrong");
          setQuizFeedback("Not yet. Review the concept and try that question again.");
          return;
        }

        const template = templateProgress();
        if (!template.correctQuizAnswers.includes(questionId)) {
          template.correctQuizAnswers.push(questionId);
        }

        question.classList.add("is-complete", "is-transitioning");
        option.classList.add("correct");
        questionOptions.forEach((item) => { item.disabled = true; });

        const allCorrect = quizQuestionIds().every((id) => template.correctQuizAnswers.includes(id));
        if (allCorrect) {
          template.quizPassed = true;
          template.highestRoomUnlocked = Math.max(template.highestRoomUnlocked, currentRoomIndex + 1);
          setQuizFeedback("Correct! The recap room is unlocked.");
          saveProgress(progress);
          window.setTimeout(() => {
            question.classList.remove("is-transitioning");
            nextRoom.hidden = false;
            renderQuizTabs();
            renderRoomList();
          }, QUIZ_ADVANCE_DELAY_MS);
          return;
        }

        setQuizFeedback("Correct! Loading the next question...");
        saveProgress(progress);
        window.setTimeout(() => {
          question.classList.remove("is-transitioning");
          goToNextUnansweredQuizQuestion();
          renderQuizTabs();
          updateQuizFeedback();
        }, QUIZ_ADVANCE_DELAY_MS);
      }

      function renderRoom() {
        const room = rooms[currentRoomIndex];
        const template = templateProgress();
        const isFinalRoom = currentRoomIndex === rooms.length - 1;
        roomBg.src = room.image;
        roomStage.classList.toggle("is-welcome-room", currentRoomIndex === 0);
        roomCounter.textContent = `Current Room: ${currentRoomIndex} / ${rooms.length - 1}`;
        hotspots.hidden = currentRoomIndex !== 0;
        prevRoom.hidden = currentRoomIndex === 0;
        nextRoom.hidden = isFinalRoom || (room.type === "quiz" && !template.quizPassed);
        topReturn.hidden = isFinalRoom;
        finalReturn.hidden = !isFinalRoom;
        hideMarkerTooltip();

        if (currentRoomIndex === 0) {
          renderWelcomeSidebarSummary();
          renderMainContent(renderWelcomeContent());
        } else {
          renderSidebarSummary(room);
          renderMainContent(room.contentHtml);
        }

        bindQuizOptions();
        updateMarkerStates();
        updateNextButtonState();
        renderRoomList();
        updateCounter();
        completeIfFinalRoom();
      }

      prevRoom.addEventListener("click", () => {
        currentRoomIndex = Math.max(0, currentRoomIndex - 1);
        renderRoom();
      });

      nextRoom.addEventListener("click", () => {
        if (currentRoomIndex === 0 && !allWelcomeMarkersDiscovered()) {
          renderMainContent(renderWelcomeContent("Discover all junction objects first."));
          updateNextButtonState();
          return;
        }

        const room = rooms[currentRoomIndex];
        if (room.type === "quiz" && !templateProgress().quizPassed) {
          setQuizFeedback("Answer every quiz question correctly to continue.");
          return;
        }

        if (currentRoomIndex < rooms.length - 1) {
          currentRoomIndex += 1;
          const template = templateProgress();
          if (currentRoomIndex > template.highestRoomUnlocked) {
            template.highestRoomUnlocked = currentRoomIndex;
            saveProgress(progress);
          }
        }
        renderRoom();
      });

      document.querySelectorAll(".info-marker").forEach((spot) => {
        spot.addEventListener("mouseenter", () => handleMarkerEnter(spot));
        spot.addEventListener("focus", () => handleMarkerEnter(spot));
        spot.addEventListener("click", (event) => {
          event.preventDefault();
          handleMarkerEnter(spot);
        });
        spot.addEventListener("mouseleave", () => {
          hideMarkerTooltip();
          if (currentRoomIndex === 0) renderWelcomeSidebarSummary();
        });
        spot.addEventListener("blur", () => {
          hideMarkerTooltip();
          if (currentRoomIndex === 0) renderWelcomeSidebarSummary();
        });
      });

      function completeIfFinalRoom() {
        if (currentRoomIndex !== rooms.length - 1) return;
        if (suppressAutoCompletion) return;
        const template = templateProgress();
        if (template.completed) return;
        template.completed = true;
        template.reward = "Subquery Mines Key";
        window.SQLKingdomProgress?.markDataPrepBuildingComplete?.(progress, "joinJunction", "Subquery Mines Key");
        saveProgress(progress);
        rewardModal.hidden = false;
      }

      finalReturn.addEventListener("click", () => {
        completeIfFinalRoom();
      });

      rewardContinue.addEventListener("click", () => {
        rewardModal.hidden = true;
      });

      window.addEventListener("sqlKingdom:reset", (event) => {
        if (event.detail.resetMode !== "local" || event.detail.cityId !== "data-prep-city") return;
        progress = getProgress();
        currentRoomIndex = 0;
        currentQuizIndex = 0;
        discoveryCompleteAnimationPlayed = false;
        renderRoom();
      });

      window.addEventListener("sqlKingdom:unlockAll", () => {
        progress = getProgress();
        suppressAutoCompletion = true;
        try {
          renderRoom();
        } finally {
          suppressAutoCompletion = false;
        }
      });

      if (canOpenJoinJunction) {
        templateProgress();
        saveProgress(progress);
        renderRoom();
      }
    </script>
  </body>
</html>
