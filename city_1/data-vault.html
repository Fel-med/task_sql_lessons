<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Vault | SQL City</title>
    <link rel="icon" type="image/webp" href="../res/city_1/item/badge.webp">
    <link rel="shortcut icon" type="image/webp" href="../res/city_1/item/badge.webp">
    <link rel="stylesheet" href="../shared_files/shared-room-layout.css" />
    <link rel="stylesheet" href="../shared_files/shared-room-components.css" />
    <style>
      .marker-shelf { left: 12%; top: 37%; }
      .marker-server { left: 28.5%; top: 48%; }
      .marker-terminal { left: 50%; top: 55%; }
      .marker-board { left: 77.5%; top: 33%; }
    </style>
  </head>
  <body>
    <main class="room-layout">
      <aside class="side-panel">
        <h1>Data Vault</h1>
        <p class="room-counter" id="roomCounter">Current Room: 0 / 6</p>
        <p class="path-title">Learning Path</p>
        <div class="lesson-list" id="roomList"></div>
        <article class="lesson-card" id="lessonCard">
          <h2 id="lessonTitle">Welcoming Room</h2>
          <div class="room-summary" id="lessonText"></div>
        </article>
      </aside>

      <section class="room-stage" aria-label="Data Vault rooms">
        <img class="room-bg" id="roomBg" src="../res/city_1/rooms_background/Room_1_Data_Vault.webp" alt="" />
        <a class="return-city-btn" id="topReturn" href="index_city_1.html">Return to the City</a>
        <div class="hotspots" id="hotspots">
          <button class="info-marker marker-shelf" type="button" data-info="shelf" data-marker-id="shelf" aria-label="Archive shelf info"></button>
          <button class="info-marker marker-server" type="button" data-info="server" data-marker-id="server" aria-label="Server cabinet info"></button>
          <button class="info-marker marker-terminal" type="button" data-info="terminal" data-marker-id="computer" aria-label="Computer terminal info"></button>
          <button class="info-marker marker-board" type="button" data-info="board" data-marker-id="board" aria-label="Chalkboard info"></button>
        </div>
        <div class="marker-tooltip" id="markerTooltip" aria-hidden="true">
          <h3 id="markerTooltipTitle"></h3>
          <p id="markerTooltipText"></p>
        </div>
        <div class="room-nav">
          <button class="pixel-btn" id="prevRoom" type="button">Previous Room</button>
          <button class="pixel-btn" id="nextRoom" type="button">Next Room</button>
          <a class="pixel-btn" id="finalReturn" href="index_city_1.html" hidden>Return to the City</a>
        </div>
        <article class="info-card" id="infoCard" aria-live="polite">
          <div id="mainLessonContent"></div>
        </article>
        <article class="reward-modal" id="rewardModal" hidden>
          <div class="reward-card">
            <img src="../res/city_1/item/regular-key.webp" class="reward-key-img" alt="Reward key">
            <h2 id="rewardTitle">Key Received!</h2>
            <p id="rewardMessage">You received the Table Department Key.</p>
            <button class="pixel-btn" id="rewardContinue" type="button">Continue</button>
          </div>
        </article>
      </section>
    </main>

    <script src="../shared_files/shared-progress.js"></script>
    <script>
      const DEFAULT_PROGRESS = {
        buildings: {
          dataVault: { unlocked: true, completed: false, newlyUnlocked: false, entered: false, quizPassed: false, highestRoomUnlocked: 0, discoveredMarkers: [] },
          tableDepartment: { unlocked: false, completed: false, newlyUnlocked: false, entered: false, quizPassed: false, highestRoomUnlocked: 0, discoveredMarkers: [] },
          keyBridgeHall: { unlocked: false, completed: false, newlyUnlocked: false, entered: false, quizPassed: false, highestRoomUnlocked: 0, discoveredMarkers: [] },
          queryLab: { unlocked: false, completed: false, newlyUnlocked: false, entered: false, quizPassed: false, highestRoomUnlocked: 0, discoveredMarkers: [] }
        },
        badges: { sqlFoundations: false }
      };
      const BUILDING_ID = "dataVault";
      const QUIZ_ADVANCE_DELAY_MS = 650;
      const NEXT_BUILDING_ID = "tableDepartment";
      const REWARD_TITLE = "Key Received!";
      const REWARD_MESSAGE = "You received the Table Department Key.";

      const rooms = [
        {
          title: "Welcoming Room",
          image: "../res/city_1/rooms_background/Room_1_Data_Vault.webp",
          type: "welcome",
          summary: "Welcome to the Data Vault. This room introduces where data lives and why SQL helps us use it.",
          points: [
            "Databases store organized data",
            "SQL asks questions from databases",
            "ML needs clean data before training"
          ],
          contentHtml: `
            <h2>Welcome to the Data Vault</h2>
            <p>This building teaches the basic idea of databases and SQL.</p>
            <p>Before using data in Machine Learning, we first need to know where data lives, how it is stored, and how we can ask for it.</p>
            <ul>
              <li>Click the room markers to discover quick hints.</li>
              <li>Use Next Room to start the lesson path.</li>
            </ul>
          `,
          markers: {
            shelf: `
              <h2>Organized Data</h2>
              <p>Data can be stored and organized like files in an archive. A database keeps data structured so we can find it later.</p>
            `,
            server: `
              <h2>Database Storage</h2>
              <p>A database usually lives on a computer or server. It stores structured data safely and makes it available when we need it.</p>
            `,
            terminal: `
              <h2>SQL Language</h2>
              <p>SQL is the language used to ask the database for data. It helps us select, filter, and sort information.</p>
            `,
            board: `
              <h2>SQL for ML</h2>
              <p>In Machine Learning, SQL helps us collect and prepare the dataset before training a model.</p>
            `
          }
        },
        {
          title: "What is a database?",
          image: "../res/city_1/rooms_background/03_Data_Vault_background.webp",
          type: "lesson",
          summary: "A database is an organized place where data is stored.",
          points: [
            "Stores data",
            "Keeps data structured",
            "Makes data easier to search and use"
          ],
          contentHtml: `
            <h2>What is a database?</h2>
            <p>A database is an organized place where data is stored.</p>
            <p>Instead of keeping data randomly in many files, a database keeps it structured so we can search, update, and use it easily.</p>
            <h3>Example</h3>
            <p>A school database can store:</p>
            <ul>
              <li>students</li>
              <li>courses</li>
              <li>teachers</li>
              <li>grades</li>
            </ul>
            <div class="pixel-box">
              School Database<br>
              -> students table<br>
              -> courses table<br>
              -> grades table
            </div>
            <h3>Machine Learning connection</h3>
            <p>Machine Learning needs data. A database is often the place where this data comes from.</p>
          `
        },
        {
          title: "What is SQL?",
          image: "../res/city_1/rooms_background/03_Data_Vault_background.webp",
          type: "lesson",
          summary: "SQL is the language used to communicate with relational databases.",
          points: [
            "SQL means Structured Query Language",
            "It asks questions from tables",
            "It retrieves useful data"
          ],
          contentHtml: `
            <h2>What is SQL?</h2>
            <p>SQL means Structured Query Language.</p>
            <p>It is the language used to communicate with relational databases.</p>
            <p>We use SQL to ask questions like:</p>
            <ul>
              <li>Show me all students.</li>
              <li>Show me customers from London.</li>
              <li>Sort orders by price.</li>
            </ul>
            <h3>First example</h3>
            <pre class="sql-code"><code>SELECT * FROM students;</code></pre>
            <p>Simple meaning:</p>
            <ul>
              <li><strong>SELECT</strong> means choose data.</li>
              <li><strong>FROM</strong> means choose the table.</li>
              <li><strong>students</strong> is the table name.</li>
            </ul>
          `
        },
        {
          title: "Why organize data?",
          image: "../res/city_1/rooms_background/03_Data_Vault_background.webp",
          type: "lesson",
          summary: "Organized data is easier to search, connect, and prepare for analysis.",
          points: [
            "Messy data is hard to use",
            "Structure makes data reliable",
            "ML needs clean datasets"
          ],
          contentHtml: `
            <h2>Why organize data?</h2>
            <p>Data must be organized because messy data is hard to use.</p>
            <p>If data is stored in a clear structure, we can find it, filter it, connect it, and prepare it for analysis or Machine Learning.</p>
            <h3>Messy data</h3>
            <pre class="sql-code"><code>Alex 21 London
Emma 19 Paris
random notes...</code></pre>
            <h3>Organized data</h3>
            <table class="result-table">
              <thead><tr><th>name</th><th>age</th><th>city</th></tr></thead>
              <tbody>
                <tr><td>Alex</td><td>21</td><td>London</td></tr>
                <tr><td>Emma</td><td>19</td><td>Paris</td></tr>
              </tbody>
            </table>
            <h3>Machine Learning connection</h3>
            <p>A model cannot learn well from messy data. Clean structure helps us create better datasets.</p>
          `
        },
        {
          title: "Databases before Machine Learning",
          image: "../res/city_1/rooms_background/03_Data_Vault_background.webp",
          type: "lesson",
          summary: "SQL helps prepare data before training a Machine Learning model.",
          points: [
            "Choose useful columns",
            "Filter useful rows",
            "Prepare clean datasets"
          ],
          contentHtml: `
            <h2>Databases before Machine Learning</h2>
            <p>Before training a Machine Learning model, we often need to collect data from a database.</p>
            <p>SQL helps us prepare the data before it becomes a dataset.</p>
            <h3>SQL helps us:</h3>
            <ul>
              <li>choose useful columns</li>
              <li>filter useful rows</li>
              <li>remove duplicates</li>
              <li>sort data</li>
              <li>prepare a clean dataset</li>
            </ul>
            <div class="flow-line">Database -> SQL Query -> Clean Dataset -> ML Model</div>
          `
        },
        {
          title: "Quiz Room",
          image: "../res/city_1/rooms_background/03_Data_Vault_background.webp",
          type: "quiz",
          summary: "Answer correctly to unlock the recap room and earn the next key.",
          points: [
            "Test the main idea",
            "Choose the best answer",
            "Unlock the recap room"
          ],
          contentHtml: `
            <h2>Quiz Room</h2>
            <p>Answer correctly to unlock the recap room.</p>
            <div class="quiz-box">
              <h3>Question</h3>
              <p>What is the main purpose of a database?</p>
              <button class="quiz-option" type="button" data-correct="true">A. To store and organize data so it can be searched and used later.</button>
              <button class="quiz-option" type="button">B. To design the visual style of a website.</button>
              <button class="quiz-option" type="button">C. To permanently delete old information.</button>
              <button class="quiz-option" type="button">D. To replace programming languages.</button>
            </div>
            <p class="quiz-feedback"></p>
          `
        },
        {
          title: "Data Vault Recap",
          image: "../res/city_1/rooms_background/03_Data_Vault_background.webp",
          type: "lesson",
          summary: "You now understand databases, SQL, and why they matter before ML.",
          points: [
            "Databases store data",
            "SQL retrieves data",
            "Clean data supports ML"
          ],
          contentHtml: `
            <h2>Data Vault Recap</h2>
            <p>You learned:</p>
            <ul>
              <li>A database stores organized data.</li>
              <li>SQL is used to ask the database for data.</li>
              <li>Organized data is important before Machine Learning.</li>
              <li>SQL helps prepare datasets for ML.</li>
            </ul>
            <p class="reward-note">Complete this room to receive the Table Department Key.</p>
          `
        }
      ];

      const welcomeMarkers = [
        {
          id: "shelf",
          title: "Organized Data",
          text: "Data can be stored and organized like files in an archive. A database keeps data structured so we can find it later."
        },
        {
          id: "server",
          title: "Database Storage",
          text: "A database usually lives on a computer or server. It stores structured data safely and makes it available when we need it."
        },
        {
          id: "computer",
          title: "SQL Language",
          text: "SQL is the language used to ask the database for data. It helps us select, filter, and sort information."
        },
        {
          id: "board",
          title: "SQL for ML",
          text: "In Machine Learning, SQL helps us collect and prepare the dataset before training a model."
        }
      ];

      let currentRoomIndex = 0;
      let discoveryCompleteAnimationPlayed = false;
      let progress = getProgress();
      const roomBg = document.querySelector("#roomBg");
      const roomStage = document.querySelector(".room-stage");
      const roomCounter = document.querySelector("#roomCounter");
      const hotspots = document.querySelector("#hotspots");
      const prevRoom = document.querySelector("#prevRoom");
      const nextRoom = document.querySelector("#nextRoom");
      const topReturn = document.querySelector("#topReturn");
      const finalReturn = document.querySelector("#finalReturn");
      const infoCard = document.querySelector("#infoCard");
      const roomList = document.querySelector("#roomList");
      const lessonTitle = document.querySelector("#lessonTitle");
      const lessonText = document.querySelector("#lessonText");
      const mainLessonContent = document.querySelector("#mainLessonContent");
      const rewardModal = document.querySelector("#rewardModal");
      const rewardTitle = document.querySelector("#rewardTitle");
      const rewardMessage = document.querySelector("#rewardMessage");
      const rewardContinue = document.querySelector("#rewardContinue");
      const markerTooltip = document.querySelector("#markerTooltip");
      const markerTooltipTitle = document.querySelector("#markerTooltipTitle");
      const markerTooltipText = document.querySelector("#markerTooltipText");

      function createDefaultProgress() {
        if (window.SQLKingdomProgress) {
          return window.SQLKingdomProgress.createDefaultProgress();
        }
        return JSON.parse(JSON.stringify(DEFAULT_PROGRESS));
      }

      function getProgress() {
        if (window.SQLKingdomProgress) {
          return window.SQLKingdomProgress.getGameProgress();
        }
        const progress = createDefaultProgress();
        try {
          const saved = JSON.parse(localStorage.getItem("sqlCityProgress"));
          if (saved && saved.buildings) {
            Object.keys(progress.buildings).forEach((buildingId) => {
              if (saved.buildings[buildingId]) {
                Object.assign(progress.buildings[buildingId], saved.buildings[buildingId]);
              }
            });
          }
          if (saved && saved.badges) {
            Object.assign(progress.badges, saved.badges);
          }
        } catch (error) {
          localStorage.removeItem("sqlCityProgress");
        }
        progress.buildings.dataVault.unlocked = true;
        return progress;
      }

      function saveProgress(progress) {
        if (window.SQLKingdomProgress) {
          window.SQLKingdomProgress.saveGameProgress(progress);
          return;
        }
        localStorage.setItem("sqlCityProgress", JSON.stringify(progress));
      }

      function unlockBuilding(buildingId) {
        if (!buildingId) return;
        const building = progress.buildings[buildingId];
        if (!building) return;
        if (!building.unlocked) {
          building.unlocked = true;
          building.newlyUnlocked = true;
        }
      }

      function completeBuilding(buildingId) {
        const building = progress.buildings[buildingId];
        if (!building || building.completed) return false;
        building.completed = true;
        return true;
      }

      function markBuildingEntered(buildingId) {
        const building = progress.buildings[buildingId];
        if (!building) return;
        building.entered = true;
        building.newlyUnlocked = false;
        saveProgress(progress);
      }

      function buildingProgress() {
        return progress.buildings[BUILDING_ID];
      }

      function markerIds() {
        return welcomeMarkers.map((marker) => marker.id);
      }

      function discoveredMarkers() {
        const building = buildingProgress();
        if (!Array.isArray(building.discoveredMarkers)) {
          building.discoveredMarkers = [];
        }
        return building.discoveredMarkers;
      }

      function discoveryCount() {
        const validMarkerIds = markerIds();
        return discoveredMarkers().filter((id) => validMarkerIds.includes(id)).length;
      }

      function allWelcomeMarkersDiscovered() {
        const discovered = discoveredMarkers();
        return welcomeMarkers.every((marker) => discovered.includes(marker.id));
      }

      function getWelcomeMarker(markerId) {
        return welcomeMarkers.find((marker) => marker.id === markerId);
      }

      function welcomeHeading() {
        const wrapper = document.createElement("div");
        wrapper.innerHTML = rooms[0].contentHtml;
        return wrapper.querySelector("h2")?.textContent || rooms[0].title;
      }

      function renderWelcomeContent(message = "", animateComplete = false) {
        const complete = allWelcomeMarkersDiscovered();
        const shouldAnimate = complete && animateComplete && !discoveryCompleteAnimationPlayed;
        const statusClass = complete
          ? `discovery-complete${shouldAnimate ? " animate-complete" : ""}`
          : "discovery-status";
        const statusText = complete
          ? "All objects discovered! You can enter the next room."
          : `Objects discovered: ${discoveryCount()} / ${welcomeMarkers.length}`;
        const warning = message ? `<p class="discovery-warning">${message}</p>` : "";

        return `
          <h2>${welcomeHeading()}</h2>
          <p>Explore every glowing object marker before starting the lesson path.</p>
          <p class="${statusClass}">${statusText}</p>
          ${complete ? "" : `<p class="discovery-hint">Hover over each marker to discover it.</p>`}
          ${warning}
        `;
      }

      function renderWelcomeSidebarSummary() {
        const complete = allWelcomeMarkersDiscovered();
        lessonTitle.textContent = rooms[0].title;
        lessonText.innerHTML = `
          <p>${rooms[0].summary}</p>
          <ul>
            <li>Objects discovered: ${discoveryCount()} / ${welcomeMarkers.length}</li>
            <li>${complete ? "Next Room unlocked." : "Discover all objects to unlock Room 1."}</li>
          </ul>
        `;
      }

      function showDiscoveryMessage(message) {
        renderMainContent(renderWelcomeContent(message));
      }

      function updateMarkerStates() {
        const discovered = discoveredMarkers();
        document.querySelectorAll(".info-marker").forEach((markerElement) => {
          const markerData = getWelcomeMarker(markerElement.dataset.markerId);
          const isDiscovered = discovered.includes(markerElement.dataset.markerId);
          markerElement.classList.toggle("is-discovered", isDiscovered);
          if (markerData) {
            markerElement.setAttribute(
              "aria-label",
              `${markerData.title} ${isDiscovered ? "discovered" : "not discovered"}`
            );
          }
        });
      }

      function unlockFirstLessonIfReady() {
        if (!allWelcomeMarkersDiscovered()) return false;
        const building = buildingProgress();
        const unlockedNow = building.highestRoomUnlocked < 1;
        building.highestRoomUnlocked = Math.max(building.highestRoomUnlocked, 1);
        saveProgress(progress);
        return unlockedNow;
      }

      function normalizeWelcomeDiscovery() {
        const building = buildingProgress();
        if (!Array.isArray(building.discoveredMarkers)) {
          building.discoveredMarkers = [];
        }
        if (building.highestRoomUnlocked > 0 && building.discoveredMarkers.length === 0) {
          building.discoveredMarkers = markerIds();
          saveProgress(progress);
        }
      }

      function markWelcomeMarkerDiscovered(markerId) {
        const markerData = getWelcomeMarker(markerId);
        if (!markerData) return;
        const wasComplete = allWelcomeMarkersDiscovered();
        const discovered = discoveredMarkers();
        if (!discovered.includes(markerId)) {
          discovered.push(markerId);
          saveProgress(progress);
        }
        const isComplete = allWelcomeMarkersDiscovered();
        if (isComplete) {
          unlockFirstLessonIfReady();
        }
        updateMarkerStates();
        if (currentRoomIndex === 0) {
          const shouldAnimateComplete = isComplete && !wasComplete && !discoveryCompleteAnimationPlayed;
          renderWelcomeSidebarSummary();
          renderMainContent(renderWelcomeContent("", shouldAnimateComplete));
          if (shouldAnimateComplete) discoveryCompleteAnimationPlayed = true;
          renderRoomList();
          updateNextButtonState();
        }
      }

      function showMarkerTooltip(markerElement, markerData) {
        markerTooltipTitle.textContent = markerData.title;
        markerTooltipText.textContent = markerData.text;
        markerTooltip.classList.add("is-visible");
        markerTooltip.setAttribute("aria-hidden", "false");

        const stageRect = roomStage.getBoundingClientRect();
        const markerRect = markerElement.getBoundingClientRect();
        const tooltipRect = markerTooltip.getBoundingClientRect();
        let left = markerRect.left - stageRect.left + markerRect.width / 2 - tooltipRect.width / 2;
        let top = markerRect.top - stageRect.top - tooltipRect.height - 14;

        if (top < 10) {
          top = markerRect.bottom - stageRect.top + 14;
        }

        left = Math.max(10, Math.min(left, stageRect.width - tooltipRect.width - 10));
        top = Math.max(10, Math.min(top, stageRect.height - tooltipRect.height - 10));

        markerTooltip.style.left = `${left}px`;
        markerTooltip.style.top = `${top}px`;
      }

      function hideMarkerTooltip() {
        markerTooltip.classList.remove("is-visible");
        markerTooltip.setAttribute("aria-hidden", "true");
      }

      function handleMarkerEnter(markerElement) {
        if (currentRoomIndex !== 0) return;
        const markerData = getWelcomeMarker(markerElement.dataset.markerId);
        if (!markerData) return;
        markWelcomeMarkerDiscovered(markerData.id);
        showMarkerTooltip(markerElement, markerData);
      }

      function updateNextButtonState() {
        const locked = currentRoomIndex === 0 && !allWelcomeMarkersDiscovered();
        nextRoom.classList.toggle("is-disabled", locked);
        nextRoom.setAttribute("aria-disabled", locked ? "true" : "false");
      }

      function updateCounter() {
        roomCounter.textContent = `Current Room: ${currentRoomIndex} / ${rooms.length - 1}`;
      }

      function formatRoomTitle(room, index) {
        return index === 0 ? "0. Welcoming Room" : `${String(index).padStart(2, "0")}. ${room.title}`;
      }

      function isRecapRoom(index) {
        return index === rooms.length - 1;
      }

      function isQuizLocked() {
        return !buildingProgress().quizPassed;
      }

      function roomLockedMessage(index) {
        if (index === 1 && !allWelcomeMarkersDiscovered()) {
          return "Discover all welcome-room objects first.";
        }
        return isRecapRoom(index) && isQuizLocked()
          ? "Complete the quiz first to unlock the recap room."
          : "Explore previous rooms first to unlock this room.";
      }

      function canEnterRoom(index) {
        if (index === 1 && !allWelcomeMarkersDiscovered()) return false;
        if (isRecapRoom(index) && isQuizLocked()) return false;
        return index <= buildingProgress().highestRoomUnlocked;
      }

      function renderRoomList() {
        roomList.innerHTML = "";
        rooms.forEach((room, index) => {
          const tab = document.createElement("button");
          tab.type = "button";
          tab.className = "room-tab";
          tab.textContent = formatRoomTitle(room, index);
          const isUnlocked = canEnterRoom(index);
          if (!isUnlocked) tab.classList.add("locked");
          if (index === currentRoomIndex) tab.classList.add("active");
          tab.addEventListener("click", () => {
            if (!isUnlocked) {
              const message = roomLockedMessage(index);
              lessonTitle.textContent = "Room locked";
              lessonText.innerHTML = `<p>${message}</p>`;
              mainLessonContent.innerHTML = `
                <h2>Room locked</h2>
                <p>${message}</p>
              `;
              return;
            }
            currentRoomIndex = index;
            renderRoom();
          });
          roomList.appendChild(tab);
        });
      }

      function renderSidebarSummary(room) {
        lessonTitle.textContent = room.title;
        lessonText.innerHTML = `
          <p>${room.summary}</p>
          <ul>${room.points.map((point) => `<li>${point}</li>`).join("")}</ul>
        `;
      }

      function renderMainContent(contentHtml) {
        mainLessonContent.innerHTML = contentHtml;
        infoCard.hidden = false;
      }

      function setQuizFeedback(message) {
        const feedback = mainLessonContent.querySelector(".quiz-feedback");
        if (feedback) feedback.textContent = message;
      }

      function shuffleArray(array) {
        const copy = [...array];
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function normalizeQuizOptionText(text) {
        return text.replace(/^[A-D]\.\s*/, "");
      }

      function shuffleQuizOptions() {
        const quizBox = mainLessonContent.querySelector(".quiz-box");
        if (!quizBox || quizBox.dataset.shuffled === "true") return;

        const options = Array.from(quizBox.querySelectorAll(".quiz-option"));
        const optionData = options.map((option) => ({
          text: normalizeQuizOptionText(option.textContent),
          correct: option.dataset.correct === "true"
        }));

        shuffleArray(optionData).forEach((data, index) => {
          const option = options[index];
          option.textContent = `${String.fromCharCode(65 + index)}. ${data.text}`;
          option.classList.remove("correct", "wrong");
          option.disabled = false;
          if (data.correct) {
            option.dataset.correct = "true";
          } else {
            delete option.dataset.correct;
          }
          quizBox.appendChild(option);
        });

        quizBox.dataset.shuffled = "true";
      }

      function bindQuizOptions() {
        if (rooms[currentRoomIndex].type !== "quiz") return;
        shuffleQuizOptions();
        const quizPassed = buildingProgress().quizPassed;
        const options = mainLessonContent.querySelectorAll(".quiz-option");
        options.forEach((option) => {
          const isCorrect = option.dataset.correct === "true";
          option.classList.toggle("correct", quizPassed && isCorrect);
          option.disabled = quizPassed;
          option.addEventListener("click", () => handleQuizAnswer(option));
        });
        if (quizPassed) {
          setQuizFeedback("Correct! A database stores organized data that can be searched and used later.");
        } else {
          setQuizFeedback("Answer the quiz correctly to continue.");
        }
      }

      function handleQuizAnswer(option) {
        if (option.disabled) return;
        const quizBox = mainLessonContent.querySelector(".quiz-box");
        const options = mainLessonContent.querySelectorAll(".quiz-option");
        options.forEach((item) => item.classList.remove("wrong"));
        quizBox?.classList.remove("is-transitioning");

        if (option.dataset.correct !== "true") {
          option.classList.add("wrong");
          setQuizFeedback("Not yet. Think about what a database is used for.");
          return;
        }

        const building = buildingProgress();
        building.quizPassed = true;
        building.highestRoomUnlocked = Math.max(building.highestRoomUnlocked, currentRoomIndex + 1);
        saveProgress(progress);
        option.classList.add("correct");
        quizBox?.classList.add("is-transitioning");
        options.forEach((item) => { item.disabled = true; });
        setQuizFeedback("Correct! A database stores organized data that can be searched and used later.");

        window.setTimeout(() => {
          quizBox?.classList.remove("is-transitioning");
          nextRoom.hidden = false;
          renderRoomList();
        }, QUIZ_ADVANCE_DELAY_MS);
      }

      function renderMarkerSummary(contentHtml) {
        const markerDoc = document.createElement("div");
        markerDoc.innerHTML = contentHtml;
        const markerTitle = markerDoc.querySelector("h2")?.textContent || "Room marker";
        const markerSummary = markerDoc.querySelector("p")?.textContent || "Explore this object for a quick lesson hint.";
        lessonTitle.textContent = markerTitle;
        lessonText.innerHTML = `<p>${markerSummary}</p>`;
      }

      function renderRoom() {
        const room = rooms[currentRoomIndex];
        const isFinalRoom = currentRoomIndex === rooms.length - 1;
        roomStage.classList.toggle("is-welcome-room", currentRoomIndex === 0);
        roomBg.src = room.image;
        updateCounter();
        hotspots.hidden = currentRoomIndex !== 0;
        prevRoom.hidden = currentRoomIndex === 0;
        nextRoom.hidden = isFinalRoom || (room.type === "quiz" && !buildingProgress().quizPassed);
        topReturn.hidden = isFinalRoom;
        finalReturn.hidden = !isFinalRoom;
        hideMarkerTooltip();
        if (currentRoomIndex === 0) {
          renderWelcomeSidebarSummary();
          renderMainContent(renderWelcomeContent());
        } else {
          renderSidebarSummary(room);
          renderMainContent(room.contentHtml);
        }
        bindQuizOptions();
        updateMarkerStates();
        updateNextButtonState();
        renderRoomList();
        completeIfFinalRoom();
      }

      prevRoom.addEventListener("click", () => {
        if (currentRoomIndex > 0) currentRoomIndex -= 1;
        renderRoom();
      });

      nextRoom.addEventListener("click", () => {
        const room = rooms[currentRoomIndex];
        if (currentRoomIndex === 0 && !allWelcomeMarkersDiscovered()) {
          showDiscoveryMessage("Discover all objects first.");
          updateNextButtonState();
          renderRoomList();
          return;
        }
        if (room.type === "quiz" && !buildingProgress().quizPassed) {
          setQuizFeedback("Answer the quiz correctly to continue.");
          return;
        }
        if (currentRoomIndex < rooms.length - 1) {
          currentRoomIndex += 1;
          if (currentRoomIndex > buildingProgress().highestRoomUnlocked) {
            buildingProgress().highestRoomUnlocked = currentRoomIndex;
            saveProgress(progress);
          }
        }
        renderRoom();
      });

      document.querySelectorAll(".info-marker").forEach((spot) => {
        spot.addEventListener("mouseenter", () => handleMarkerEnter(spot));
        spot.addEventListener("focus", () => handleMarkerEnter(spot));
        spot.addEventListener("click", (event) => {
          event.preventDefault();
          handleMarkerEnter(spot);
        });
        spot.addEventListener("mouseleave", () => {
          hideMarkerTooltip();
          if (currentRoomIndex === 0) renderWelcomeSidebarSummary();
        });
        spot.addEventListener("blur", () => {
          hideMarkerTooltip();
          if (currentRoomIndex === 0) renderWelcomeSidebarSummary();
        });
      });

      function showReward() {
        rewardTitle.textContent = REWARD_TITLE;
        rewardMessage.textContent = REWARD_MESSAGE;
        rewardModal.hidden = false;
      }

      function completeIfFinalRoom() {
        if (currentRoomIndex !== rooms.length - 1) return;
        const building = buildingProgress();
        if (building.completed) return;
        building.highestRoomUnlocked = Math.max(building.highestRoomUnlocked, currentRoomIndex);
        if (completeBuilding(BUILDING_ID)) {
          unlockBuilding(NEXT_BUILDING_ID);
          saveProgress(progress);
          showReward();
        }
      }

      rewardContinue.addEventListener("click", () => {
        rewardModal.hidden = true;
      });

      if (!buildingProgress().unlocked) {
        window.location.href = "index_city_1.html";
      } else {
        markBuildingEntered(BUILDING_ID);
        normalizeWelcomeDiscovery();
        renderRoom();
      }
    </script>
  </body>
</html>
