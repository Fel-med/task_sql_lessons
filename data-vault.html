<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Vault | SQL City</title>
    <style>
      :root {
        --cream: #fff4c2;
        --ink: #111827;
        --stage: #0f172a;
        --cyan: #5fffd6;
        --yellow: #ffd76a;
        --font-pixel: "Courier New", Courier, monospace;
      }

      * { box-sizing: border-box; }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        background: var(--stage);
        color: white;
        font-family: var(--font-pixel);
      }

      .room-layout {
        width: 100vw;
        height: 100vh;
        display: grid;
        grid-template-columns: 260px 1fr;
        overflow: hidden;
        background: var(--stage);
      }

      .side-panel {
        height: 100vh;
        padding: 18px;
        overflow: hidden;
        border-right: 4px solid #000;
        background: var(--ink);
        color: white;
      }

      .side-panel h1 {
        margin: 0 0 14px;
        color: var(--cream);
        font-size: 30px;
        line-height: 1;
        text-shadow: 3px 3px 0 #000;
      }

      .room-counter,
      .path-title {
        margin: 0 0 14px;
        font-size: 14px;
        font-weight: 900;
        line-height: 1.4;
      }

      .room-counter { color: var(--cyan); }

      .path-title {
        margin-top: 18px;
        color: var(--cream);
        text-transform: uppercase;
      }

      .lesson-list {
        display: grid;
        gap: 6px;
      }

      .room-tab,
      .pixel-btn {
        border: 3px solid rgba(255, 244, 194, 0.72);
        background: #172033;
        box-shadow: 4px 4px 0 #000;
        color: white;
        font-family: var(--font-pixel);
        font-weight: 900;
      }

      .room-tab {
        width: 100%;
        min-height: 34px;
        padding: 8px;
        cursor: pointer;
        text-align: left;
        font-size: 12px;
        line-height: 1.2;
      }

      .room-tab:not(.locked):hover,
      .room-tab:not(.locked):focus-visible {
        border-color: var(--cyan);
        box-shadow: 0 0 12px rgba(95, 255, 214, 0.55), 4px 4px 0 #000;
        outline: none;
      }

      .room-tab.locked {
        opacity: 0.45;
        cursor: not-allowed;
        filter: grayscale(0.6);
      }

      .room-tab.active {
        color: var(--cyan);
        border-color: var(--cyan);
        background: rgba(95, 255, 214, 0.12);
        box-shadow:
          0 0 12px rgba(95, 255, 214, 0.65),
          inset 0 0 12px rgba(95, 255, 214, 0.12);
      }

      .room-tab.active::before { content: "> "; }
      .room-tab.locked::before { content: "LOCK "; }

      .lesson-card {
        margin-top: 12px;
        padding: 10px;
        border: 3px solid var(--cyan);
        background: #0b1220;
        box-shadow: 4px 4px 0 #000;
      }

      .lesson-card h2 {
        margin: 0 0 8px;
        color: var(--cyan);
        font-size: 15px;
      }

      .lesson-card p {
        margin: 0;
        color: var(--cream);
        font-size: 13px;
        font-weight: 900;
        line-height: 1.45;
      }

      .room-summary p {
        margin: 0 0 8px;
        color: var(--cream);
        font-size: 13px;
        font-weight: 900;
        line-height: 1.45;
      }

      .room-summary ul {
        margin: 0;
        padding-left: 18px;
        color: white;
        font-size: 12px;
        font-weight: 900;
        line-height: 1.45;
      }

      .pixel-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 14px 22px;
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        text-decoration: none;
        text-transform: uppercase;
      }

      .pixel-btn:hover,
      .pixel-btn:focus-visible {
        background: var(--yellow);
        color: var(--ink);
        outline: none;
      }

      .room-stage {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background: black;
      }

      .room-bg {
        width: 100%;
        height: 100%;
        object-fit: cover;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        user-select: none;
      }

      .room-nav {
        position: absolute;
        z-index: 90;
        left: 50%;
        bottom: 32px;
        display: flex;
        gap: 24px;
        transform: translateX(-50%);
      }

      .return-city-btn {
        position: absolute;
        top: 28px;
        right: 28px;
        z-index: 95;
        padding: 12px 18px;
        border: 3px solid var(--cream);
        background: var(--ink);
        box-shadow: 4px 4px 0 #000;
        color: var(--cream);
        font-family: var(--font-pixel);
        font-weight: 900;
        text-decoration: none;
        text-transform: uppercase;
      }

      .return-city-btn:hover,
      .return-city-btn:focus-visible {
        background: var(--yellow);
        color: var(--ink);
        outline: none;
      }

      .info-marker {
        position: absolute;
        z-index: 80;
        width: 20px;
        height: 20px;
        padding: 0;
        border: 3px solid var(--cyan);
        background: rgba(255, 244, 194, 0.85);
        box-shadow:
          0 0 0 2px var(--stage),
          0 0 12px rgba(95, 255, 214, 1),
          0 0 24px rgba(95, 255, 214, 0.8),
          inset 0 0 6px rgba(95, 255, 214, 0.7);
        cursor: pointer;
        image-rendering: pixelated;
      }

      .info-marker::after {
        content: "";
        position: absolute;
        inset: -7px;
        border: 2px solid rgba(255, 244, 194, 0.45);
        box-shadow: 0 0 10px rgba(95, 255, 214, 0.65);
        pointer-events: none;
      }

      .info-marker:hover {
        background: var(--cyan);
        border-color: var(--cream);
        box-shadow:
          0 0 0 2px var(--stage),
          0 0 18px rgba(95, 255, 214, 1),
          0 0 32px rgba(255, 244, 194, 0.9),
          inset 0 0 8px rgba(255, 255, 255, 0.9);
        transform: scale(1.18);
      }

      .info-marker:focus-visible {
        outline: 3px solid var(--cream);
        outline-offset: 4px;
      }

      .marker-shelf { left: 13%; top: 46%; }
      .marker-server { left: 28%; top: 52%; }
      .marker-terminal { left: 47%; top: 63%; }
      .marker-board { left: 70%; top: 39%; }


      .info-card {
        position: absolute;
        right: 32px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 35;
        width: min(680px, 44vw);
        max-height: calc(100vh - 180px);
        overflow: hidden;
        padding: 16px 18px;
        border: 3px solid var(--cyan);
        background: rgba(15, 23, 42, 0.92);
        box-shadow:
          4px 4px 0 #000,
          0 0 18px rgba(95, 255, 214, 0.45);
        color: var(--cream);
        font-size: clamp(0.72rem, 0.85vw, 0.95rem);
        line-height: 1.45;
      }

      .room-stage.is-welcome-room .info-card {
        top: auto;
        right: 32px;
        bottom: 32px;
        width: min(520px, 36vw);
        max-height: 240px;
        transform: none;
      }

      .info-card[hidden],
      .hotspots[hidden],
      .return-city-btn[hidden],
      .reward-modal[hidden],
      .pixel-btn[hidden] { display: none; }

      .info-card h2,
      .info-card h3 {
        margin: 0 0 10px;
        color: var(--cyan);
        font-size: clamp(1.1rem, 1.5vw, 1.6rem);
        text-shadow: 3px 3px 0 #000;
      }

      .info-card h3 {
        margin: 14px 0 8px;
        color: var(--yellow);
        font-size: clamp(0.9rem, 1.1vw, 1.1rem);
      }

      .info-card p,
      .info-card li {
        color: white;
        font-size: inherit;
        font-weight: 900;
        line-height: 1.45;
      }

      .info-card p {
        margin: 8px 0;
      }

      .info-card ul {
        margin: 8px 0;
        padding-left: 22px;
      }

      .sql-code {
        max-width: 100%;
        margin: 8px 0;
        padding: 10px;
        overflow-x: auto;
        border: 2px solid #334155;
        background: #020617;
        color: var(--cyan);
        font: 900 14px/1.45 var(--font-pixel);
      }

      .result-table {
        width: 100%;
        margin: 8px 0;
        border-collapse: collapse;
        background: rgba(2, 6, 23, 0.78);
        font-size: 0.85rem;
      }

      .result-table th,
      .result-table td {
        padding: 5px 7px;
        border: 2px solid #334155;
        color: white;
        text-align: left;
      }

      .result-table th {
        color: var(--yellow);
      }

      .pixel-box,
      .flow-line {
        margin: 8px 0;
        padding: 12px;
        border: 2px solid var(--cream);
        background: rgba(2, 6, 23, 0.7);
        box-shadow: 4px 4px 0 #000;
        color: var(--cream);
        font-weight: 900;
        line-height: 1.5;
      }

      .flow-line {
        border-color: var(--cyan);
        color: var(--cyan);
      }

      .reward-note {
        color: var(--yellow) !important;
        text-shadow: 2px 2px 0 #000;
      }

      .reward-modal {
        position: absolute;
        inset: 0;
        z-index: 60;
        display: grid;
        place-items: center;
        background: rgba(15, 23, 42, 0.45);
      }

      .reward-card {
        width: min(88%, 520px);
        padding: 22px;
        border: 4px solid var(--cream);
        background: rgba(17, 24, 39, 0.96);
        box-shadow:
          8px 8px 0 #000,
          0 0 24px rgba(95, 255, 214, 0.45);
        color: var(--cream);
        text-align: center;
      }

      .reward-card h2 {
        margin: 0 0 12px;
        color: var(--yellow);
        font-size: clamp(22px, 3vw, 34px);
        text-shadow: 3px 3px 0 #000;
      }

      .reward-card p {
        margin: 0 0 18px;
        font-size: 15px;
        font-weight: 900;
        line-height: 1.45;
      }

      .reward-key-img {
        width: clamp(90px, 12vw, 160px);
        height: auto;
        display: block;
        margin: 0 auto 18px;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        filter:
          drop-shadow(0 0 8px rgba(255, 215, 106, 0.85))
          drop-shadow(0 0 16px rgba(95, 255, 214, 0.45));
        animation: keyFloat 1.4s ease-in-out infinite alternate;
      }

      @keyframes keyFloat {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-8px);
        }
      }

      @media (max-width: 900px) {
        .info-card,
        .room-stage.is-welcome-room .info-card {
          right: 16px;
          left: 16px;
          top: auto;
          bottom: 90px;
          width: auto;
          max-height: 42vh;
          overflow-y: auto;
          transform: none;
        }
      }

      @media (max-width: 760px) {
        .room-layout {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
        }

        .side-panel {
          height: auto;
          max-height: 44vh;
          overflow: hidden;
          border-right: 0;
          border-bottom: 4px solid #000;
        }

        .side-panel h1 { font-size: 24px; }
        .room-stage { height: 100%; min-height: 0; }
        .room-nav { bottom: 18px; gap: 12px; }
        .pixel-btn { padding: 11px 12px; font-size: 12px; }
        .info-card,
        .room-stage.is-welcome-room .info-card { bottom: 86px; max-height: 34vh; }
      }
    </style>
  </head>
  <body>
    <main class="room-layout">
      <aside class="side-panel">
        <h1>Data Vault</h1>
        <p class="room-counter" id="roomCounter">Current Room: 0 / 5</p>
        <p class="path-title">Learning Path</p>
        <div class="lesson-list" id="roomList"></div>
        <article class="lesson-card" id="lessonCard">
          <h2 id="lessonTitle">Welcoming Room</h2>
          <div class="room-summary" id="lessonText"></div>
        </article>
      </aside>

      <section class="room-stage" aria-label="Data Vault rooms">
        <img class="room-bg" id="roomBg" src="res/rooms_background/Room_1_Data_Vault.png" alt="" />
        <a class="return-city-btn" id="topReturn" href="index.html">Return to the City</a>
        <div class="hotspots" id="hotspots">
          <button class="info-marker marker-shelf" type="button" data-info="shelf" aria-label="Archive shelf info"></button>
          <button class="info-marker marker-server" type="button" data-info="server" aria-label="Server cabinet info"></button>
          <button class="info-marker marker-terminal" type="button" data-info="terminal" aria-label="Computer terminal info"></button>
          <button class="info-marker marker-board" type="button" data-info="board" aria-label="Chalkboard info"></button>
        </div>
        <div class="room-nav">
          <button class="pixel-btn" id="prevRoom" type="button">Previous Room</button>
          <button class="pixel-btn" id="nextRoom" type="button">Next Room</button>
          <a class="pixel-btn" id="finalReturn" href="index.html" hidden>Return to the City</a>
        </div>
        <article class="info-card" id="infoCard" aria-live="polite">
          <div id="mainLessonContent"></div>
        </article>
        <article class="reward-modal" id="rewardModal" hidden>
          <div class="reward-card">
            <img src="res/keys/regular-key.png" class="reward-key-img" alt="Reward key">
            <h2 id="rewardTitle">Key Received!</h2>
            <p id="rewardMessage">You received the Table Department Key.</p>
            <button class="pixel-btn" id="rewardContinue" type="button">Continue</button>
          </div>
        </article>
      </section>
    </main>

    <script>
      const DEFAULT_PROGRESS = {
        buildings: {
          dataVault: { unlocked: true, completed: false, newlyUnlocked: false, entered: false, highestRoomUnlocked: 0 },
          tableDepartment: { unlocked: false, completed: false, newlyUnlocked: false, entered: false, highestRoomUnlocked: 0 },
          keyBridgeHall: { unlocked: false, completed: false, newlyUnlocked: false, entered: false, highestRoomUnlocked: 0 },
          queryLab: { unlocked: false, completed: false, newlyUnlocked: false, entered: false, highestRoomUnlocked: 0 }
        },
        badges: { sqlFoundations: false }
      };
      const BUILDING_ID = "dataVault";
      const NEXT_BUILDING_ID = "tableDepartment";
      const REWARD_TITLE = "Key Received!";
      const REWARD_MESSAGE = "You received the Table Department Key.";

      const rooms = [
        {
          title: "Welcoming Room",
          image: "res/rooms_background/Room_1_Data_Vault.png",
          type: "welcome",
          summary: "Welcome to the Data Vault. This room introduces where data lives and why SQL helps us use it.",
          points: [
            "Databases store organized data",
            "SQL asks questions from databases",
            "ML needs clean data before training"
          ],
          contentHtml: `
            <h2>Welcome to the Data Vault</h2>
            <p>This building teaches the basic idea of databases and SQL.</p>
            <p>Before using data in Machine Learning, we first need to know where data lives, how it is stored, and how we can ask for it.</p>
            <ul>
              <li>Click the room markers to discover quick hints.</li>
              <li>Use Next Room to start the lesson path.</li>
            </ul>
          `,
          markers: {
            shelf: `
              <h2>Organized Data</h2>
              <p>Data can be stored and organized like files in an archive. A database keeps data structured so we can find it later.</p>
            `,
            server: `
              <h2>Database Storage</h2>
              <p>A database usually lives on a computer or server. It stores structured data safely and makes it available when we need it.</p>
            `,
            terminal: `
              <h2>SQL Language</h2>
              <p>SQL is the language used to ask the database for data. It helps us select, filter, and sort information.</p>
            `,
            board: `
              <h2>SQL for ML</h2>
              <p>In Machine Learning, SQL helps us collect and prepare the dataset before training a model.</p>
            `
          }
        },
        {
          title: "What is a database?",
          image: "res/rooms_background/03_Data_Vault_background.png",
          type: "lesson",
          summary: "A database is an organized place where data is stored.",
          points: [
            "Stores data",
            "Keeps data structured",
            "Makes data easier to search and use"
          ],
          contentHtml: `
            <h2>What is a database?</h2>
            <p>A database is an organized place where data is stored.</p>
            <p>Instead of keeping data randomly in many files, a database keeps it structured so we can search, update, and use it easily.</p>
            <h3>Example</h3>
            <p>A school database can store:</p>
            <ul>
              <li>students</li>
              <li>courses</li>
              <li>teachers</li>
              <li>grades</li>
            </ul>
            <div class="pixel-box">
              School Database<br>
              -> students table<br>
              -> courses table<br>
              -> grades table
            </div>
            <h3>Machine Learning connection</h3>
            <p>Machine Learning needs data. A database is often the place where this data comes from.</p>
          `
        },
        {
          title: "What is SQL?",
          image: "res/rooms_background/03_Data_Vault_background.png",
          type: "lesson",
          summary: "SQL is the language used to communicate with relational databases.",
          points: [
            "SQL means Structured Query Language",
            "It asks questions from tables",
            "It retrieves useful data"
          ],
          contentHtml: `
            <h2>What is SQL?</h2>
            <p>SQL means Structured Query Language.</p>
            <p>It is the language used to communicate with relational databases.</p>
            <p>We use SQL to ask questions like:</p>
            <ul>
              <li>Show me all students.</li>
              <li>Show me customers from Tunisia.</li>
              <li>Sort orders by price.</li>
            </ul>
            <h3>First example</h3>
            <pre class="sql-code"><code>SELECT * FROM students;</code></pre>
            <p>Simple meaning:</p>
            <ul>
              <li><strong>SELECT</strong> means choose data.</li>
              <li><strong>FROM</strong> means choose the table.</li>
              <li><strong>students</strong> is the table name.</li>
            </ul>
          `
        },
        {
          title: "Why organize data?",
          image: "res/rooms_background/03_Data_Vault_background.png",
          type: "lesson",
          summary: "Organized data is easier to search, connect, and prepare for analysis.",
          points: [
            "Messy data is hard to use",
            "Structure makes data reliable",
            "ML needs clean datasets"
          ],
          contentHtml: `
            <h2>Why organize data?</h2>
            <p>Data must be organized because messy data is hard to use.</p>
            <p>If data is stored in a clear structure, we can find it, filter it, connect it, and prepare it for analysis or Machine Learning.</p>
            <h3>Messy data</h3>
            <pre class="sql-code"><code>Med 21 Tunis
Sara 19 Sfax
random notes...</code></pre>
            <h3>Organized data</h3>
            <table class="result-table">
              <thead><tr><th>name</th><th>age</th><th>city</th></tr></thead>
              <tbody>
                <tr><td>Med</td><td>21</td><td>Tunis</td></tr>
                <tr><td>Sara</td><td>19</td><td>Sfax</td></tr>
              </tbody>
            </table>
            <h3>Machine Learning connection</h3>
            <p>A model cannot learn well from messy data. Clean structure helps us create better datasets.</p>
          `
        },
        {
          title: "Databases before Machine Learning",
          image: "res/rooms_background/03_Data_Vault_background.png",
          type: "lesson",
          summary: "SQL helps prepare data before training a Machine Learning model.",
          points: [
            "Choose useful columns",
            "Filter useful rows",
            "Prepare clean datasets"
          ],
          contentHtml: `
            <h2>Databases before Machine Learning</h2>
            <p>Before training a Machine Learning model, we often need to collect data from a database.</p>
            <p>SQL helps us prepare the data before it becomes a dataset.</p>
            <h3>SQL helps us:</h3>
            <ul>
              <li>choose useful columns</li>
              <li>filter useful rows</li>
              <li>remove duplicates</li>
              <li>sort data</li>
              <li>prepare a clean dataset</li>
            </ul>
            <div class="flow-line">Database -> SQL Query -> Clean Dataset -> ML Model</div>
          `
        },
        {
          title: "Data Vault Recap",
          image: "res/rooms_background/03_Data_Vault_background.png",
          type: "lesson",
          summary: "You now understand databases, SQL, and why they matter before ML.",
          points: [
            "Databases store data",
            "SQL retrieves data",
            "Clean data supports ML"
          ],
          contentHtml: `
            <h2>Data Vault Recap</h2>
            <p>You learned:</p>
            <ul>
              <li>A database stores organized data.</li>
              <li>SQL is used to ask the database for data.</li>
              <li>Organized data is important before Machine Learning.</li>
              <li>SQL helps prepare datasets for ML.</li>
            </ul>
            <p class="reward-note">Complete this room to receive the Table Department Key.</p>
          `
        }
      ];

      let currentRoomIndex = 0;
      let progress = getProgress();
      const roomBg = document.querySelector("#roomBg");
      const roomStage = document.querySelector(".room-stage");
      const roomCounter = document.querySelector("#roomCounter");
      const hotspots = document.querySelector("#hotspots");
      const prevRoom = document.querySelector("#prevRoom");
      const nextRoom = document.querySelector("#nextRoom");
      const topReturn = document.querySelector("#topReturn");
      const finalReturn = document.querySelector("#finalReturn");
      const infoCard = document.querySelector("#infoCard");
      const roomList = document.querySelector("#roomList");
      const lessonTitle = document.querySelector("#lessonTitle");
      const lessonText = document.querySelector("#lessonText");
      const mainLessonContent = document.querySelector("#mainLessonContent");
      const rewardModal = document.querySelector("#rewardModal");
      const rewardTitle = document.querySelector("#rewardTitle");
      const rewardMessage = document.querySelector("#rewardMessage");
      const rewardContinue = document.querySelector("#rewardContinue");

      function createDefaultProgress() {
        return JSON.parse(JSON.stringify(DEFAULT_PROGRESS));
      }

      function getProgress() {
        const progress = createDefaultProgress();
        try {
          const saved = JSON.parse(localStorage.getItem("sqlCityProgress"));
          if (saved && saved.buildings) {
            Object.keys(progress.buildings).forEach((buildingId) => {
              if (saved.buildings[buildingId]) {
                Object.assign(progress.buildings[buildingId], saved.buildings[buildingId]);
              }
            });
          }
          if (saved && saved.badges) {
            Object.assign(progress.badges, saved.badges);
          }
        } catch (error) {
          localStorage.removeItem("sqlCityProgress");
        }
        progress.buildings.dataVault.unlocked = true;
        return progress;
      }

      function saveProgress(progress) {
        localStorage.setItem("sqlCityProgress", JSON.stringify(progress));
      }

      function unlockBuilding(buildingId) {
        if (!buildingId) return;
        const building = progress.buildings[buildingId];
        if (!building) return;
        if (!building.unlocked) {
          building.unlocked = true;
          building.newlyUnlocked = true;
        }
      }

      function completeBuilding(buildingId) {
        const building = progress.buildings[buildingId];
        if (!building || building.completed) return false;
        building.completed = true;
        return true;
      }

      function markBuildingEntered(buildingId) {
        const building = progress.buildings[buildingId];
        if (!building) return;
        building.entered = true;
        building.newlyUnlocked = false;
        saveProgress(progress);
      }

      function buildingProgress() {
        return progress.buildings[BUILDING_ID];
      }

      function updateCounter() {
        roomCounter.textContent = `Current Room: ${currentRoomIndex} / ${rooms.length - 1}`;
      }

      function formatRoomTitle(room, index) {
        return index === 0 ? "0. Welcoming Room" : `${String(index).padStart(2, "0")}. ${room.title}`;
      }

      function renderRoomList() {
        roomList.innerHTML = "";
        rooms.forEach((room, index) => {
          const tab = document.createElement("button");
          tab.type = "button";
          tab.className = "room-tab";
          tab.textContent = formatRoomTitle(room, index);
          const isUnlocked = index <= buildingProgress().highestRoomUnlocked;
          if (!isUnlocked) tab.classList.add("locked");
          if (index === currentRoomIndex) tab.classList.add("active");
          tab.addEventListener("click", () => {
            if (!isUnlocked) {
              lessonTitle.textContent = "Room locked";
              lessonText.innerHTML = "<p>Explore previous rooms first to unlock this room.</p>";
              mainLessonContent.innerHTML = `
                <h2>Room locked</h2>
                <p>Explore previous rooms first to unlock this room.</p>
              `;
              return;
            }
            currentRoomIndex = index;
            renderRoom();
          });
          roomList.appendChild(tab);
        });
      }

      function renderSidebarSummary(room) {
        lessonTitle.textContent = room.title;
        lessonText.innerHTML = `
          <p>${room.summary}</p>
          <ul>${room.points.map((point) => `<li>${point}</li>`).join("")}</ul>
        `;
      }

      function renderMainContent(contentHtml) {
        mainLessonContent.innerHTML = contentHtml;
        infoCard.hidden = false;
      }

      function renderMarkerSummary(contentHtml) {
        const markerDoc = document.createElement("div");
        markerDoc.innerHTML = contentHtml;
        const markerTitle = markerDoc.querySelector("h2")?.textContent || "Room marker";
        const markerSummary = markerDoc.querySelector("p")?.textContent || "Explore this object for a quick lesson hint.";
        lessonTitle.textContent = markerTitle;
        lessonText.innerHTML = `<p>${markerSummary}</p>`;
      }

      function renderRoom() {
        const room = rooms[currentRoomIndex];
        const isFinalRoom = currentRoomIndex === rooms.length - 1;
        roomStage.classList.toggle("is-welcome-room", currentRoomIndex === 0);
        roomBg.src = room.image;
        updateCounter();
        hotspots.hidden = currentRoomIndex !== 0;
        prevRoom.hidden = currentRoomIndex === 0;
        nextRoom.hidden = isFinalRoom;
        topReturn.hidden = isFinalRoom;
        finalReturn.hidden = !isFinalRoom;
        renderSidebarSummary(room);
        renderMainContent(room.contentHtml);
        renderRoomList();
        completeIfFinalRoom();
      }

      prevRoom.addEventListener("click", () => {
        if (currentRoomIndex > 0) currentRoomIndex -= 1;
        renderRoom();
      });

      nextRoom.addEventListener("click", () => {
        if (currentRoomIndex < rooms.length - 1) {
          currentRoomIndex += 1;
          if (currentRoomIndex > buildingProgress().highestRoomUnlocked) {
            buildingProgress().highestRoomUnlocked = currentRoomIndex;
            saveProgress(progress);
          }
        }
        renderRoom();
      });

      document.querySelectorAll(".info-marker").forEach((spot) => {
        spot.addEventListener("click", () => {
          const markerContent = rooms[0].markers?.[spot.dataset.info];
          if (markerContent) {
            renderMarkerSummary(markerContent);
            renderMainContent(markerContent);
          }
        });
      });

      function showReward() {
        rewardTitle.textContent = REWARD_TITLE;
        rewardMessage.textContent = REWARD_MESSAGE;
        rewardModal.hidden = false;
      }

      function completeIfFinalRoom() {
        if (currentRoomIndex !== rooms.length - 1) return;
        const building = buildingProgress();
        if (building.completed) return;
        building.highestRoomUnlocked = Math.max(building.highestRoomUnlocked, currentRoomIndex);
        if (completeBuilding(BUILDING_ID)) {
          unlockBuilding(NEXT_BUILDING_ID);
          saveProgress(progress);
          showReward();
        }
      }

      rewardContinue.addEventListener("click", () => {
        rewardModal.hidden = true;
      });

      if (!buildingProgress().unlocked) {
        window.location.href = "index.html";
      } else {
        markBuildingEntered(BUILDING_ID);
        renderRoom();
      }
    </script>
  </body>
</html>
